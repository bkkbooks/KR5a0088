body:
  text: 度人上品妙經序來一竊以美玉混塵必假磨礲之巧至言藏妙須憑潤色之功故經傳能悉之辭易有盡象之語靈機所悟玄理斯彰恭惟太上洞玄靈寶無量度人上品妙經者飛玄結氣雲篆成文為萬法之宗冠三洞之首淵兮隱奧難可尋詳若非已造於幽微孰敢亂陳於箋注矧下士罕窺其篇目玄科切禁於妄傳雖念誦勤渠莫知宗旨如登寶所素手而回數墨巡行竟無所得於是東海青元真人憫斯愚昧大闡洪音斥新舊疑文立見成要論條分八事詳釋二章首明理性之因終顯命根之祕開盲釋聵演道登真破執著之旁觀接探端之上學或微微引喻或縷縷談玄與乎浩劫慈尊金口無異間有包括未詳豫乃作頌重美其意俾誦之士得以研窮然後動地放光處處黍珠出現因言悟理人人法病頓除斯為宗教之淵源可為度人之本旨也故以無量名之化諸道子鋟木刊行廣施未悟豈世之小補哉清河老人書
