front:
  text: 元始無量度人上品妙經註卷中来二
  hash: sha256:60a0866b7c16317149e082abe1e1a198aa263d8d377b74dc61f136df473032f0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0088_SJB_002-020262b, image: sjb/02/020262b.png}
body:
  text: 東海青元眞人註清河老人頌浄明道子郭岡鳳參校并讚元始無量度人上品妙經元爲萬物之根立乎大象之首寥廓而幽光運化而不窮人能深其根固其蔕與天相乆矣頌曰自已根宗欲了眞鐵鞋踏破謾勞形癡兒住舍須千載今日方能識主人始爲恍惚之數在毫末之初變化之先者萬物起乎始歸乎終復歸元始始之爲義湛然獨尊而變遷遂有形質頌曰當時愚魯未知賢被汝勾牽入世纏有志丈夫終識破去來自在不攀緣无者有也有即无也无有有无爲道之本迎之不見其首隨之不見其後隱然默存也頌曰恍惚之中妙用殊箇中端的立形軀不須境外徒勞覓混物氤氲更是誰量者道之用極而不盡也天之數一地之數二萬物之數三一二三萬物極品類殊當歸其一以此爲量即无量也頌曰登高看處幾由旬无極无窮甚杳冥俯仰不知天地闊要須籠絡一其眞度者道无體也含光而立人无根也變偽爲眞元一變生神神一變生眞眞一變生道物假物成物人假眞成道識物守眞斯爲度矣頌曰土木形骸竟屬空无明影裏逐洪濛須憑物外非常術方可飛騰出世籠人者杳冥恍惚要妙之間人在其中矣恍恍惚惚火中生神杳杳冥冥水中生精火炎升上七變為神水流降下六化爲精七六變化上下相成精神往來妙體含眞各眞其眞是謂眞人也頌曰此身元自貴無比本來湛寂通天地造化只憑陰與陽地水火風都是穢上者道之妙也吞赤納黄吸蒼服素收元於元宫生神生象焉然後棄萬物遺萬化獨得其玄是謂无上之上頌曰三百功成萬行奇塵中奪得錦標歸玉臺已為題名籍方顯男兒志不卑品者識衆觀一守一抱一歸吾至一是謂之品道本无形言安有品方便設教故有品也頌曰三千六百法門多只要分明識正他大道不期千日就休教歲月謾蹉跎妙者萬法之宗故天地虚妙而清陰陽同妙而純日月合妙而明五行含妙而精萬物盡妙而真妙觀者見无象之象妙聽者聞无聲之聲不可視不可聽不可有不可无斯爲眞妙矣頌曰不无不有本純眞非色非聲絶等倫模寫形容難到處玄中位象甚分明經者天地之經綸日月運行晝夜不息終而復始化而不盡者也古之人仰視俯察必依乎道不踰軌不失常不以外物失其素斯經之本也頌曰屈指師資願力悲驪珠不惜等閑揮分明指我飛仙道山嶽玄恩報勿虧參校贊元始二字贊云大象之先强名曰元天地之祖萬物之源三才既分有始可言人知還返終歸其根眞空寂照浩劫之前无量二字贊云形未有時道實在兹莫知其名以无字之不可究詰孰能測窺即此爲量其量莫推玄之又玄悟者同歸度人二字贊云形既有時變化由斯所以變者非道而誰偽度而眞腐度而奇衆人之中獨異何爲蛻凡入聖同夷希微上品二字贊云莫知其高乃以上言有物混成在天地先自下而觀孰居其前即此爲品言豈容宣等倫之中逈出超然妙經二字贊云朝陽升東夜月當空玉出石璞珠現蚌中最貴者道妙豈可窮敷落爲經眞常則同天地有劫妙經无終元始闡道開化普度章闡揚道德開化人天周治三界是則名普參校曰經有道言此二章之標揭而青元眞人經註以此表二章之一也立象起修四百五十七言凡夫性昧背本失眞故首立象法開示蹊徑爲道之根本參校曰清河老人序述青元經註有曰條分八事此八事之一也元始洞玄靈寳本章上品妙首十迴度人百魔隱韻離合自然此乃天眞皇人述經本旨言天尊含弘妙道禀立自然覆蓋萬品最尊最貴洞觀玄一化度人天故云元始洞玄也能以大慧光明煥照十方世界在天曰靈在世曰寶故曰靈寶皆金口敷演故云本章具載修眞合道之本其品最上爲衆妙之首密隱魔眞之諱合梵炁而凝散則爲炁合則爲文乃變化消息之道非墨跡之比爲萬法之祖三洞之尊智者識之修鍊成寶黄庭經云治生之道了不煩祖修洞玄與玉篇此之謂也頌曰欲知元始度人方靈寳元來號本章内隱百魔誰會得若能離合自然光混洞赤文无无上眞元始祖劫化生諸天開明三景是爲天根上无復祖唯道爲身五文開廓普植神靈混洞者天地未判之象也元始之前其炁純而赤風澤相混是爲大洞始結文章唯天尊凝凝獨立在无无之最上得眞中之至眞故云无无上眞元始祖劫即龍漢小劫曰延康初因一炁生三炁爲三清上境三炁生九炁以成九天九天之外又列三十二天即化生諸天也然後布日月星辰主持萬物即開明三景之光爲天地之象然不逃遷變之運天尊乃含混洞始生五行眞炁凝爲符篆俾安鎮天地生化神靈尸於三界使主持萬法故得懸而不落久而不壊者也以此五文演成五千之字具載妙元神眞道之根本上應五行爲開化之首也如人之未形神識安在哉混混沌沌屯屯蒙蒙無分無别不有不无无无曰道道爲人之根此道之散遂成其樸樸散爲炁炁凝生神神具則有形矣乃人之本元本始如此然後布三田開九竅五臟六腑即化生諸天之象三田者精血之凑理萬炁之根原即開明三景爲一身陰陽營衛之本也且人之生雖自胞胎其元則起於无始之始誰祖誰宗禀道炁爲質假精血而寓成變化者也五神列布然後三萬六千關節根元本始一時生神豈不爲神靈普植哉乃知道不遠人人悟而修鍊可以昇仙愚人執迷不能尊其炁貴其根保其命固其形自取死壞離其本眞耳故遠於道也頌曰位極无无最上眞始乎龍漢迄于今不增不减常清静是則名爲大法身無文不光無文不明無文不立無文不成無文不度無文不生大朴散天地分靈文結玉字出然後萬象有光萬象開明萬法定立萬物自成萬靈受度萬類出生若一炁未判五文不形則何以生成者哉如人之生若非道炁降以眞靈資養開之化之則幻色之身憑何據立矣頌曰靈寳分光初敞露文章煥燦無今古安天鎮地顯生成不是云云紙上語是爲大梵天中之天鬱羅蕭臺玉山上京上極无上大羅玉清渺渺劫仞若亡若存三華離便大有妙庭金闕玉房森羅浄霐大行梵炁周迴十方中有度人不死之神中有南極長生之君中有度世司馬大神中有好生韓君丈人中有南上司命司録延壽益筭度厄尊神迴骸起死无量度人今日校録諸天臨軒自无色以去悉名梵天此云大梵者即道炁始凝者也天中之天者即三清大羅聖境也大者覆蓋萬天羅者羅絡三界極高无上故稱大羅中有玉京之山周迴八萬里下與崑崙對立山有鬱羅簫臺臺有七寶城城有玉清殿天尊居其中上極謂无極也渺渺浩勃惟上仙視之即見中下之仙不可窺也其高數仞而不可量乍有乍無故云若存若亡乃元始消息之道又有三華離便之宫大有之庭皆宴息之所每諸天上帝相會之時必歩虚吟詠三遶此庭方睹玉相也金闕玉房瑶池翠水森森列布憑梵炁周回運轉不息故得久而長存此宫有度人不死之神隱居其中亦元始分化之號長生君即朱陵大帝治太微垣司火鍊之事度世君主陽九百六之變司馬君主滅邪却試好生君即青華之别名也主治詮校韓君主南昌品秩學人司命司録主功過予奪延夀益筭主增註年命度厄之神主消平厄難回骸起死君主昇度死魂飛尸登晨今天尊説法之際皆蒙召制臨集帝軒校圖檢録品度學人也如人之身七寳之貴與玉京無異腦宫為鬱羅之臺金闕玉房森羅浄霐冥然列布不死之神位其中若使梵炁周回不息亦如天之不落久而無壊也頌曰梵炁周回徧十方玉京金闕極森芒忘情内觀三清境盡是長生不死鄉參校曰經曰化生諸天又曰是為大梵天中之天以至大羅玉清經註已明别録又載九天九霄梵炁天名霄名今附録焉始青天附以太霄暉明流光素景天青元天附以青霄元真寳曜天始丹天附以丹霄總生開靈傳道天太丹天附以絳霄太平應化道主天始素天附以景霄中極至妙變空天太素天附以玉霄皓元威德耀晶天始玄天附以琅霄飛青元關溥濟名太玄天附以紫霄合景雙關化身天中天清微天附以神霄玉清妙境下統九霄梵炁又别本經註有三天九天三十二天之圖附生神章九天在三天之下三十二天之上第一鬱單无量天在南第二上上襌善无量壽天在西北第三梵監須延天在東第四寂然兜術天在西南第五波羅尼密不驕樂天在東南第六洞无化應聲天在北第七靈化梵輔天在西第八高虚清明天在東北第九无想无結无愛天在北或曰波利天此九天皆是梵炁又即是始青天及太霄等天别名也并附見于此東方无極飛天神王長生大聖无量度人南方无極飛天神王長生大聖无量度人西方无極飛天神王長生大聖无量度人北方无極飛天神王長生大聖无量度人東北无極飛天神王長生大聖无量度人東南无極飛天神王長生大聖无量度人西南无極飛天神王長生大聖无量度人西北无極飛天神王長生大聖无量度人上方无極飛天神王長生大聖无量度人下方无極飛天神王長生大聖无量度人自東為始乃至十方道炁分形其妙難測此則飛天大聖无極神王之尊號神王繼元始而生自龍漢之前元始開化首布此神俾執持天炁領括天仙總御生死洞理陰符撫掌兆民凡劫運終則神王陶鑄學人行保舉事凡昇降之格悉皆所係頌曰法身本自無異相化現十方元一様只縁大聖能長生度人所以无邊量十方至眞飛天神王長生度世无量大神並乘飛雲丹輿緑輦羽蓋瓊輪驂駕朱鳳五色玄龍建九色之節十絶靈旛前嘯九鳳齊唱後吹八鸞同鳴獅子白鶴嘯歌邕邕五老啓途群仙翼轅億乘萬騎浮空而來傾光迴駕監眞度生輿輦輪蓋皆陽精之炁所成鳳鳥龍鶴乃陰精之炁所化上聖之人具眞常之道呼吸合散隨意現前陰陽之炁調諧成歌成曲皆純眞所爲非外物也人能修鍊靈寳内成陰魔屏盡齊集陽神以㑹鍊眞之府其元炁一呼萬神咸聽五臟神靈各隨方色自現輿輦儀衛來迎然後百骸衆神前導後從昇舉朝元與斯無異也頌曰紛紜仙仗貴難勝雜還笙歌盡不成此箇風光誰使得大都不離自家身濟度生死一百五十八言前者設象示勸修眞今當濟生拔死以彰載度之事參校曰此青元註經條分八事之二也諸天丞相南昌上宫韓司主録監生大神執籙把籍齊到帝前隨所應度嚴校諸天三十二天各有丞相乃天中宰協侍宸主録勒籍之司也南昌即丹天世界朱陵火府遷化學人鍊度之所也韓司即宫中文人主鍊度文籍之事監生主生魂鑄魄更生之别名也感天尊願力各持録籍齊到帝前校其應受度者或以宿名玄圖骨相合仙或修齋奉戒功德積感或以敬奉三寳善功徹天或供養師寳爲三官所稱名在諸天者各爲嚴行考校然後據功量品而升度之頌曰感召諸天集帝庭區區校録有何因世間積善功高者便有南昌鍊度人普吿三界無極神鄉泉曲之府北都羅酆三官九署十二河源上解祖考億劫種親疾除罪簿落滅惡根不得拘留逼合鬼群元始符命時刻昇遷三界天地水也無極神鄉盡三界中神庭社廟之司也泉曲在北溟之最下爲江海之要府皆停録罪魂之處北都羅酆者自清炁上為諸天之外其重濁之炁凝成此山在天地之北山高五億五萬五千五百里周回三萬里上參碧落下際風泉黑鬱之炁盤礴其中山有六天洞宫一曰紂絶陰天宫二曰奉殺諒事宗天宫三曰明晨耐犯武城天宫四曰恬照罪炁天宫五曰宗靈七非天宫六曰敢司連宛天宫每一宫各有一大魔王主之爲三元之總轄五嶽之都司又有三宫上元宫在山之阿去天爲近天官領之主校功録善陞降品秩中元宫在山之左地官領之中有靈獄主治罪魂為追呼之府也下元宫在山之右去風壘近水官領之下有九囚大獄寒水之庭八難之場主治世間惡逆重罪囚鬼此三宫各有三府府有一百二十冥曹盡酆都界官吏總九萬九千九百萬衆皆以世間明靈者爲之九署者即九壘土皇九令之司也十二河源者如導岍導嶓𡻑之類乃分治罪魂之所今天尊既命諸天嚴行檢校昇度學人又下九龍符命普告三元使爲學人上解祖考億劫已來種識支親速爲削除罪籍落滅三惡之根不得拘留滯礙逼合於囚鬼之群應時刻而昇遷也頌曰諦觀符命自誰宣能釋幽牢罪苦纏返本還元扶起命人人時刻得昇遷北都寒池部衛形魂制魔保舉度品南宫死魂受鍊仙化成人生身受度劫劫長存隨劫輪轉與天齊年酆都洞陰之境有朔單鬱絶之都五靈玄老五炁天君主之九地之中北陰天君主之九水之中太溟水帝主之總號曰北都中有三界大魔三五將軍六甲掾吏五帝考官又有孰罰神兵巨天力士萬人皆司校罪魂名籍之神也夫人在世脩學淺薄而罪器深重者不免歸此其生也爲陽魂其死也爲陰魄若妄源不息則陰魂散亂莫可執持故令部衛其形使不散壊制御群魔令行保舉度品於南宫使彼死魂受大火鍊鬼質消盡然後羽化成仙死魂受鍊者謂血肉更生非但父母所生之身蓋道身也故云生身此之道身一蒙仙度則隨劫流轉與天齊年也頌曰形魂只要我扶持制得群魔不受欺這箇生身須自度待他保舉恐成遲永度三途五苦八難超凌三界逍遥上清上清之天天帝玉眞无色之境梵行三途者謂地獄鬼趣旁生五苦者謂刀山劍樹之屬在世則生老貧病死八難者謂墮落異類生爲下賤形容不正生在邊方禀性兇戾不遇仁君常值兵火與一切善自生魔障故三途五苦經云三業浄則不墮三途謂身心口也由此三業爲十惡根爲衆業本心業浄則地獄無有口業浄則鬼氣清消身業浄則不生異趣去五毒則除五苦謂眼觀五色鼻嗅五香舌了五味耳聽五音心生五慾但使一根一塵清浄則五苦惡道從何而起當自泯矣脩八行則消八難謂仁慈孝敬忠信清廉和柔忍辱奉戒平等由此八行爲萬善根度世之本也或以八難爲地獄囚閉之事此則滯境不該至理宜從此義上清者乃玉帝之都大道无色之境梵行者法也謂有法可脩有行可進故稱梵行凡死魂受度拜謁帝京然後隨功各昇彼天次第脩習頌曰罪垢皆由心境昏三途五苦累形魂天光一洗根塵浄仙化朝元禮至尊品述諸天四百一十三言前者令下三界根括生死升度學人次當敷述諸天升降品格以示進脩地位參校曰此青元註經條分八事之三也東方八天元始積九陽梵炁以成故應東方六天爲欲界二天爲色界黄曾天在虚梵之首宿次奎璧唯餘七天宿次斗牛女虚危室璧參校曰别本註帝服青冕青旒青服青裳六天爲欲界清濁分九陽一輕之炁成天在衆天之下去凡五百二十億萬里乃風霄之界世人行三浄行建百善功者得生此天天人夀命不等初出凡界欲染未除故天中之人有形可見其間或以接手爲欲或以言辭或以眼視或以身交故云欲界此天快樂絶勝諸天故多貪著衰相易現壽命終盡則復淪諸趣若漸次脩習欲染頓除則昇入色界脩小乘道可以證此謂之天人釋經所謂脩六度行初進之侣天中具有太清三百六十科戒檢制天人如大劫交大火自崑崙根起梵燒世界炎焰上昇直至和陽天於是元炁潰散天乃淪壞頌曰珠闕瓊樓是欲根嬪娥彩麗奏天鈞但將愛處休躭染項背圓光轉轉明太皇黄曾天異號浄天或稱覩史其色黄應東方宿次奎璧世人脩十善功初出凡者得生此天帝鬱繿玉明鬱鑑天帝覺之内諱玉明帝魔之隱音雲篆太虚之文元始以玉簡金書祕于天之紫極宫參校曰别本註云帝主長生籙太明玉完天或稱勝妙天色緑應東方宿次璧世人建二十善功二根浄者生此天帝須阿那田須阿天王内文那田天王隠音四字金書祕之于天之紫房宫參校曰别本註云帝主度魂更生清明何童天異號光天其色黑應東方宿次室世人建四十善功三根浄者生此天帝元育齊京元育天王之隱諱齊京真人内文四字金書祕于天之九晨宫參校曰别本註云帝主敷布政教度脱天人也玄胎平育天異號梵天或稱忉利其色赤應東方宿次危世人建六十善功四根浄者生此天帝劉度内鮮即天帝君之隱名四字金書祕于天之元景宫參校曰别本註云帝主召魔舉仙元明文舉天或云化樂其色蒼應東方宿次虚世人建八十善功五根浄者得生此天帝醜法輪醜天君内文法輪帝之異號三字金書祕于天之廣寒宫參校曰别本註云帝主通行元炁上明七曜摩夷天異號化樂謂欲樂之極其色黑應東方宿次女世人脩一百善功六根浄者得生于此天帝恬懀烏外切延恬懀天帝内音延爲隠號三字金書祕于天之太陰宫參校曰别本註云帝主開度幽難一十八天爲色界清濁分輕清之炁以成其色不同在无色之下去欲界三十萬里乃丹霞之景鹿塵六天脩下元三百戒積三百善功者乃昇此天細塵六天脩中元五百戒積七百善功者昇之輕塵六天脩上元七百戒積八百善功者昇之雖無情慾尚有形色可見故云色界若漸次脩習塵染頓盡形色不昇則轉入无色界若生貪著則復墜下天脩中乗道可以證此謂之天仙其上者謂眞仙釋名四果天中具有上清二百四十科戒檢制天人如大劫交水自東井起洪泉鼓波漂蕩世界直望極風天元炁潰散此天淪壊頌曰勤脩功行始超塵快樂宫中享大椿心鏡一輪勤拂拭花冠整頓勿欹傾虛无越衡天或云初梵其色碧應東方宿次牛天人六根雖浄尚拘色塵乃昇此天亦號初襌天帝正定光即天帝君之内文三字金書祕于天之太玄宫參校曰别本註云帝主无上之道太極濛翳天或云上梵其色紫應東方宿次斗天人一色塵鹿浄乃昇此天亦號