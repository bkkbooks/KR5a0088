front:
  text: 元始無量度人上品妙經注卷中來二
  hash: sha256:9246d85813a6ee90e719761b567542e650a0b08771164111718a7d572b774944
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0088_HFL_002-001a, image: hfl/0040/0040-074.png}
body:
  text: 東海青元真人注清河老人頌淨明道子郭岡鳳參校并讚元始無量度人上品妙經元為萬物之根立乎大象之首寥廓而幽光運化而不窮人能深其根固其蒂與天相久矣頌曰自已根宗欲了真鐵鞋踏破謾勞形癡兒住舍須千載今日方能識主人始為恍惚之數在毫末之初變化之先者萬物起乎始歸乎終復歸元始始之為義湛然獨尊而變遷遂有形質頌曰當時愚魯未知賢被汝勾牽入世纏有志丈夫終識破去來自在不攀緣無者有也有即無也無有有無為道之本迎之不見其首隨之不見其後隱然默存也頌曰恍惚之中妙用殊箇中端的立形軀不須境外徒勞覓混物氤氲更是誰量者道之用極而不盡也天之數一地之數二萬物之數三一二三萬物極品類殊當歸其一以此為量即無量也頌曰登高看處幾由旬無極無窮甚杳冥俯仰不知天地闊要須籠絡一其真度者道無體也含光而立人無根也變偽為真元一變生神神一變生真真一變生道物假物成物人假真成道識物守真斯為度矣頌曰土木形骸竟屬空無明影裏逐洪濛須憑物外非常術方可飛騰出世籠人者杳冥恍惚要妙之間人在其中矣恍恍惚惚火中生神杳杳冥冥水中生精火炎升上七變為神水流降下六化為精七六變化上下相成精神往來妙體含真各真其真是謂真人也頌曰此身元自貴無比本來湛寂通天地造化只憑陰與陽地水火風都是穢上者道之妙也吞赤納黃吸蒼服素收元於元宫生神生象焉然後棄萬物遺萬化獨得其玄是謂無上之上頌曰三百功成萬行奇塵中奪得錦標歸玉臺已為題名籍方顯男兒志不卑品者識衆觀一守一抱一歸吾至一是謂之品道本無形言安有品方便設教故有品也頌曰三千六百法門多只要分明識正他大道不期千日就休教歲月謾蹉跎妙者萬法之宗故天地虛妙而清陰陽同妙而純日月合妙而明五行含妙而精萬物盡妙而真妙觀者見無象之象妙聽者聞無聲之聲不可視不可聽不可有不可無斯為真妙矣頌曰不無不有本純真非色非聲絶等倫模寫形容難到處玄中位象甚分明經者天地之經綸日月運行晝夜不息終而復始化而不盡者也古之人仰視俯察必依乎道不踰軌不失常不以外物失其素斯經之本也頌曰屈指師資願力悲驪珠不惜等間揮分明指我飛仙道山嶽玄恩報勿虧參校贊元始二字贊云大象之先強名曰元天地之祖萬物之源三才既分有始可言人知還返終歸其根真空寂照浩劫之前無量二字贊云形未有時道實在兹莫知其名以無字之不可究詰孰能測窺即此為量其量莫推玄之又玄悟者同歸度人二字贊云形既有時變化由斯所以變者非道而誰偽度而真腐度而奇衆人之中獨異何為蛻凡入聖同夷希微上品二字贊云莫知其高乃以上言有物混成在天地先自下而觀孰居其前即此為品言豈容宣等倫之中逈出超然妙經二字贊云朝陽升東夜月當空玉出石璞珠現蚌中最貴者道妙豈可窮敷落為經真常則同天地有劫妙經無終元始闡道開化普度章闡揚道德開化人天周治三界是則名普參校曰經有道言此二章之標揭而青元真人經注以此表二章之一也立象起修四百五十七言凡夫性昧背本失真故首立象法開示蹊徑為道之根本參校曰清河老人序述青元經注有曰條分八事此八事之一也元始洞玄靈寶本章上品妙首十回度人百魔隱韻離合自然此乃天真皇人述經本旨言天尊含弘妙道稟立自然覆蓋萬品最尊最貴洞觀玄一化度人天故云元始洞玄也能以大慧光明煥照十方世界在天曰靈在世曰寶故曰靈寶皆金口敷演故云本章具載修真合道之本其品最上為衆妙之首密隱魔真之諱合梵氣而凝散則為氣合則為文乃變化消息之道非墨迹之比為萬法之祖三洞之尊智者識之修鍊成寶黃庭經云治生之道了不煩祖修洞玄與玉篇此之謂也頌曰欲知元始度人方靈寶元來號本章內隱百魔誰會得若能離合自然光混洞赤文無無上真元始祖劫化生諸天開明三景是為天根上無復祖唯道為身五文開廓普植神靈混洞者天地未判之象也元始之前其氣純而赤風澤相混是為大洞始結文章唯天尊凝凝獨立在無無之最上得真中之至真故云無無上真元始祖劫即龍漢小劫曰延康初因一氣生三氣為三清上境三氣生九氣以成九天九天之外又列三十二天即化生諸天也然後布日月星辰主持萬物即開明三景之光為天地之象然不逃遷變之運天尊乃含混洞始生五行真氣凝為符篆俾安鎮天地生化神靈尸於三界使主持萬法故得懸而不落久而不壞者也以此五文演成五千之字具載妙元神真道之根本上應五行為開化之首也如人之未形神識安在哉混混沌沌屯屯蒙蒙無分無别不有不無無無曰道道為人之根此道之散遂成其朴朴散為氣氣凝生神神具則有形矣乃人之本元本始如此然後布三田開九竅五臟六腑即化生諸天之象三田者精血之湊理萬氣之根原即開明三景為一身陰陽營衛之本也且人之生雖自胞胎其元則起於無始之始誰祖誰宗稟道氣為質假精血而寓成變化者也五神列布然後三萬六千關節根元本始一時生神豈不為神靈普植哉乃知道不遠人人悟而修鍊可以升仙愚人執迷不能尊其氣貴其根保其命固其形自取死壞離其本真耳故遠於道也頌曰位極無無最上真始乎龍漢迄于今不增不減常清靜是則名為大法身無文不光無文不明無文不立無文不成無文不度無文不生大朴散天地分靈文結玉字出然後萬象有光萬象開明萬法定立萬物自成萬靈受度萬類出生若一氣未判五文不形則何以生成者哉如人之生若非道氣降以真靈資養開之化之則幻色之身憑何據立矣頌曰靈寶分光初敞露文章煥燦無今古安天鎮地顯生成不是云云紙上語是為大梵天中之天鬱羅蕭臺玉山上京上極無上大羅玉清渺渺劫仞若亡若存三華離便大有妙庭金闕玉房森羅淨霐大行梵氣周回十方中有度人不死之神中有南極長生之君中有度世司馬大神中有好生韓君丈人中有南上司命司録延壽益算度厄尊神回骸起死無量度人今日校録諸天臨軒自無色以去悉名梵天此云大梵者即道氣始凝者也天中之天者即三清大羅聖境也大者覆蓋萬天羅者羅絡三界極高無上故稱大羅中有玉京之山周回八萬里下與崑崙對立山有鬱羅簫臺臺有七寶城城有玉清殿天尊居其中上極謂無極也渺渺浩勃惟上仙視之即見中下之仙不可窺也其高數仞而不可量乍有乍無故云若存若亡乃元始消息之道又有三華離便之宫大有之庭皆宴息之所每諸天上帝相會之時必步虛吟詠三繞此庭方睹玉相也金闕玉房瑶池翠水森森列布憑梵氣周回運轉不息故得久而長存此宫有度人不死之神隱居其中亦元始分化之號長生君即朱陵大帝治太微垣司火鍊之事度世君主陽九百六之變司馬君主滅邪却試好生君即青華之别名也主治詮校韓君主南昌品秩學人司命司録主功過豫奪延夀益算主增注年命度厄之神主消平厄難回骸起死君主升度死魂飛尸登晨今天尊説法之際皆蒙召制臨集帝軒校圖檢録品度學人也如人之身七寶之貴與玉京無異腦宫為鬱羅之臺金闕玉房森羅淨霐冥然列布不死之神位其中若使梵氣周回不息亦如天之不落久而無壞也頌曰梵氣周回遍十方玉京金闕極森芒忘情內觀三清境盡是長生不死鄉參校曰經曰化生諸天又曰是為大梵天中之天以至大羅玉清經注已明别録又載九天九霄梵氣天名霄名今附録焉始青天附以太霄暉明流光素景天青元天附以青霄元真寶曜天始丹天附以丹霄總生開靈傳道天太丹天附以絳霄太平應化道主天始素天附以景霄中極至妙變空天太素天附以玉霄皓元威德耀晶天始玄天附以琅霄飛青元關溥濟名太玄天附以紫霄合景雙關化身天中天清微天附以神霄玉清妙境下統九霄梵氣又别本經注有三天九天三十二天之圖附生神章九天在三天之下三十二天之上第一鬱單無量天在南第二上上襌善無量壽天在西北第三梵監須延天在東第四寂然兜術天在西南第五波羅尼密不驕樂天在東南第六洞無化應聲天在北第七靈化梵輔天在西第八高虛清明天在東北第九無想無結無愛天在北或曰波利天此九天皆是梵氣又即是始青天及太霄等天别名也并附見于此東方無極飛天神王長生大聖無量度人南方無極飛天神王長生大聖無量度人西方無極飛天神王長生大聖無量度人北方無極飛天神王長生大聖無量度人東北無極飛天神王長生大聖無量度人東南無極飛天神王長生大聖無量度人西南無極飛天神王長生大聖無量度人西北無極飛天神王長生大聖無量度人上方無極飛天神王長生大聖無量度人下方無極飛天神王長生大聖無量度人自東為始乃至十方道氣分形其妙難測此則飛天大聖無極神王之尊號神王繼元始而生自龍漢之前元始開化首布此神俾執持天氣領括天仙總御生死洞理陰符撫掌兆民凡劫運終則神王陶鑄學人行保舉事凡升降之格悉皆所係頌曰法身本自無異相化現十方元一樣只緣大聖能長生度人所以無邊量十方至真飛天神王長生度世無量大神並乘飛雲丹輿緑輦羽蓋瓊輪驂駕朱鳳五色玄龍建九色之節十絶靈幡前嘯九鳳齊唱後吹八鸞同鳴獅子白鶴嘯歌雍雍五老啓途群仙翼轅億乘萬騎浮空而來傾光回駕監真度生輿輦輪蓋皆陽精之氣所成鳳鳥龍鶴乃陰精之氣所化上聖之人具真常之道呼吸合散隨意現前陰陽之氣調諧成歌成曲皆純真所為非外物也人能修鍊靈寶內成陰魔屏盡齊集陽神以會鍊真之府其元氣一呼萬神咸聽五臟神靈各隨方色自現輿輦儀衛來迎然後百骸衆神前導後從升舉朝元與斯無異也頌曰紛紜仙仗貴難勝雜還笙歌盡不成此箇風光誰使得大都不離自家身濟度生死一百五十八言前者設象示勸修真今當濟生拔死以彰載度之事參校曰此青元注經條分八事之二也諸天丞相南昌上宫韓司主録監生大神執籙把籍齊到帝前隨所應度嚴校諸天三十二天各有丞相乃天中宰協侍宸主録勒籍之司也南昌即丹天世界朱陵火府遷化學人鍊度之所也韓司即宫中文人主鍊度文籍之事監生主生魂鑄魄更生之别名也感天尊願力各持録籍齊到帝前校其應受度者或以宿名玄圖骨相合仙或修齋奉戒功德積感或以敬奉三寶善功徹天或供養師寶為三官所稱名在諸天者各為嚴行考校然後據功量品而升度之頌曰感召諸天集帝庭區區校録有何因世間積善功高者便有南昌鍊度人普告三界無極神鄉泉曲之府北都羅酆三官九署十二河源上解祖考億劫種親疾除罪簿落滅惡根不得拘留逼合鬼群元始符命時刻升遷三界天地水也無極神鄉盡三界中神庭社廟之司也泉曲在北溟之最下為江海之要府皆停録罪魂之處北都羅酆者自清氣上為諸天之外其重濁之氣凝成此山在天地之北山高五億五萬五千五百里周回三萬里上參碧落下際風泉黑鬱之氣盤礴其中山有六天洞宫一曰紂絶陰天宫二曰奉殺諒事宗天宫三曰明晨耐犯武城天宫四曰恬照罪氣天宫五曰宗靈七非天宫六曰敢司連宛天宫每一宫各有一大魔王主之為三元之總轄五嶽之都司又有三宫上元宫在山之阿去天為近天官領之主校功録善升降品秩中元宫在山之左地官領之中有靈獄主治罪魂為追呼之府也下元宫在山之右去風壘近水官領之下有九囚大獄寒水之庭八難之場主治世間惡逆重罪囚鬼此三宫各有三府府有一百二十冥曹盡酆都界官吏總九萬九千九百萬衆皆以世間明靈者為之九署者即九壘土皇九令之司也十二河源者如導岍導嶓𡻑之類乃分治罪魂之所今天尊既命諸天嚴行檢校升度學人又下九龍符命普告三元使為學人上解祖考億劫已來種識支親速為削除罪籍落滅三惡之根不得拘留滯礙逼合於囚鬼之群應時刻而升遷也頌曰諦觀符命自誰宣能釋幽牢罪苦纏返本還元扶起命人人時刻得升遷北都寒池部衛形魂制魔保舉度品南宫死魂受鍊仙化成人生身受度劫劫長存隨劫輪轉與天齊年酆都洞陰之境有朔單鬱絶之都五靈玄老五氣天君主之九地之中北陰天君主之九水之中太溟水帝主之總號曰北都中有三界大魔三五將軍六甲掾吏五帝考官又有孰罰神兵巨天力士萬人皆司校罪魂名籍之神也夫人在世修學淺薄而罪器深重者不免歸此其生也為陽魂其死也為陰魄若妄源不息則陰魂散亂莫可執持故令部衛其形使不散壞制御群魔令行保舉度品於南宫使彼死魂受大火鍊鬼質消盡然後羽化成仙死魂受鍊者謂血肉更生非但父母所生之身蓋道身也故云生身此之道身一蒙仙度則隨劫流轉與天齊年也頌曰形魂只要我扶持制得群魔不受欺這箇生身須自度待他保舉恐成遲永度三途五苦八難超凌三界逍遙上清上清之天天帝玉真無色之境梵行三途者謂地獄鬼趣旁生五苦者謂刀山劍樹之屬在世則生老貧病死八難者謂墮落異類生為下賤形容不正生在邊方稟性凶戾不遇仁君常值兵火與一切善自生魔障故三途五苦經云三業淨則不墮三途謂身心口也由此三業為十惡根為衆業本心業淨則地獄無有口業淨則鬼氣清消身業淨則不生異趣去五毒則除五苦謂眼觀五色鼻嗅五香舌了五味耳聽五音心生五欲但使一根一塵清淨則五苦惡道從何而起當自泯矣修八行則消八難謂仁慈孝敬忠信清廉和柔忍辱奉戒平等由此八行為萬善根度世之本也或以八難為地獄囚閉之事此則滯境不該至理宜從此義上清者乃玉帝之都大道無色之境梵行者法也謂有法可修有行可進故稱梵行凡死魂受度拜謁帝京然後隨功各升彼天次第修習頌曰罪垢皆由心境昏三途五苦纍形魂天光一洗根塵淨仙化朝元禮至尊品述諸天四百一十三言前者令下三界根括生死升度學人次當敷述諸天升降品格以示進修地位參校曰此青元注經條分八事之三也東方八天元始積九陽梵氣以成故應東方六天為欲界二天為色界黃曾天在虛梵之首宿次奎璧唯餘七天宿次斗牛女虛危室璧參校曰别本注帝服青冕青旒青服青裳六天為欲界清濁分九陽一輕之氣成天在衆天之下去凡五百二十億萬里乃風霄之界世人行三淨行建百善功者得生此天天人夀命不等初出凡界欲染未除故天中之人有形可見其間或以接手為欲或以言辭或以眼視或以身交故云欲界此天快樂絶勝諸天故多貪著衰相易現壽命終盡則復淪諸趣若漸次修習欲染頓除則升入色界修小乘道可以證此謂之天人釋經所謂修六度行初進之侣天中具有太清三百六十科戒檢制天人如大劫交大火自崑崙根起梵燒世界炎焰上升直至和陽天於是元氣潰散天乃淪壞頌曰珠闕瓊樓是欲根嬪娥彩麗奏天鈞但將愛處休耽染項背圓光轉轉明太皇黃曾天異號淨天或稱覩史其色黃應東方宿次奎璧世人修十善功初出凡者得生此天帝鬱繿玉明鬱鑑天帝覺之內諱玉明帝魔之隱音雲篆太虛之文元始以玉簡金書祕于天之紫極宫參校曰别本注云帝主長生籙太明玉完天或稱勝妙天色緑應東方宿次璧世人建二十善功二根淨者生此天帝須阿那田須阿天王內文那田天王隱音四字金書祕之于天之紫房宫參校曰别本注云帝主度魂更生清明何童天異號光天其色黑應東方宿次室世人建四十善功三根淨者生此天帝元育齊京元育天王之隱諱齊京真人內文四字金書祕于天之九晨宫參校曰别本注云帝主敷布政教度脫天人也玄胎平育天異號梵天或稱忉利其色赤應東方宿次危世人建六十善功四根淨者生此天帝劉度內鮮即天帝君之隱名四字金書祕于天之元景宫參校曰别本注云帝主召魔舉仙元明文舉天或云化樂其色蒼應東方宿次虛世人建八十善功五根淨者得生此天帝醜法輪醜天君內文法輪帝之異號三字金書祕于天之廣寒宫參校曰别本注云帝主通行元氣上明七曜摩夷天異號化樂謂欲樂之極其色黑應東方宿次女世人修一百善功六根淨者得生于此天帝恬懀烏外切延恬懀天帝內音延為隱號三字金書祕于天之太陰宫參校曰别本注云帝主開度幽難一十八天為色界清濁分輕清之氣以成其色不同在無色之下去欲界三十萬里乃丹霞之景鹿塵六天修下元三百戒積三百善功者乃升此天細塵六天修中元五百戒積七百善功者升之輕塵六天修上元七百戒積八百善功者升之雖無情欲尚有形色可見故云色界若漸次修習塵染頓盡形色不升則轉入無色界若生貪著則復墜下天修中乘道可以證此謂之天仙其上者謂真仙釋名四果天中具有上清二百四十科戒檢制天人如大劫交水自東井起洪泉鼓波漂蕩世界直望極風天元氣潰散此天淪壞頌曰勤修功行始超塵快樂宫中享大椿心鏡一輪勤拂拭花冠整頓勿欹傾虛無越衡天或云初梵其色碧應東方宿次牛天人六根雖淨尚拘色塵乃升此天亦號初襌天帝正定光即天帝君之內文三字金書祕于天之太玄宫參校曰别本注云帝主無上之道太極濛翳天或云上梵其色紫應東方宿次斗天人一色塵鹿淨乃升此天亦號