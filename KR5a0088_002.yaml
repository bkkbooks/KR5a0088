天之色不同在大羅之下去無色界一百三十五萬八千里乃太虛之景天人經歷諸天諸塵漏盡一相無相皆悉空寂結習頓忘洞入真道者乃升此天釋云已入正修得三摩地天中常住不滅多是歷代聖君賢臣居之如羲皇周孔之屬是也亦無禁戒但飛行元氣上朝九清若積功而真妙則升入大羅修最上乘之道可以證此謂之仙聖如大數交三劫大起三界損盡此天元氣復混為一聖人降生凡世開教立法製造萬物以度人庶故生神經云以充種民此之謂也蓋為民之種故云種民頌曰無影無形大法身不生不滅號成真幾經劫石消磨盡寂寂神光依舊明太虛無上常融天異號不動其色緑應北方宿次昴天人初出三界結習頓忘尚喜無為漸入神觀乃升此天帝總監音鑑鬼神乃天帝君之都諱乃攝魔之內音四字金書祕于天之萬福宫參校曰别本注云帝主校學者之功太釋玉隆騰勝天異號大不動天其色青應北方宿次胃天人喜習頓除神觀轉妙乃升此天帝眇眇行元四字乃帝君之隱號金書祕于天之白蓋宫參校曰别本注云帝主召集仙聖龍變梵度天異號上妙天其色赤應北方宿次婁天人清淨無染證不空果乃升此天帝運上玄玄運上天王之內文玄玄玉真之總音四字金書祕于天之靈寶宫此天别有宫闕號曰延真釋氏見性成佛頓悟大乘洞入最上乘者乃居其中時遊三界諸天教諸天人菩薩修諸梵行參校曰别本注云帝主進仙成聖太極平育賈音古奕天異號最上妙其色蒼應北方宿次奎天人洞入道妙證無上玄覺乃升此天天人修習至此號為究竟升玄轉入三境帝大擇法門天王之總文四字金書祕于天之天寶宫參校曰別本注云帝主普度學者之身三十二天三十二帝諸天隱諱諸天隱名天中空洞自然靈章諸天隱韻天中之音天中之尊天中之神天中大魔天中之靈九和十合變化上清無量之奧深不可詳敷落神真普度天人天尊所説諸天諸帝皆是空洞之氣自然結成隱文帝魔神靈尊之祕神靈憑之而變化遊空飛行於上清乃九和十合之歌音非文辭之比也敷者布也落者置也皆元始開化而述布置於諸天使執持天氣以度天人也頌曰一層天有一般名只要修行不染塵直到諸天最高處始知平育作真人參校曰三十二天有欲界色界無色界種民天四者之分青元經注備述學人內功外行升進之序甚詳愚嘗參考道經釋典述成修證品附于經卷之後敕魔護道二百六十六言前明品位勸修今當檢敕神靈掃蕩魔試扶衛學人參校曰此青元注經條分八事之四也今日欣慶受度歷關諸天請滅三惡斬絶地根飛度五户名列太玄魔王監舉無拘天門夫人作諸不善則魂怒而神靈去體知其同入惡道故也若作一切善則魂喜而百靈集知其同證道故也修學之士一旦成真受度則百骸衆神欣然而相慶也今日者謂成道之日也人之求仙須得惡根斬絶罪垢消泯使身器清淨乃得仙度故天尊言今日欣慶受度則必歷關于諸天親謁大帝請滅三途之惡難斷絶地司之罪根不歷五苦紀名字於太玄都司注定仙籍於是諸天魔王監真保舉更無拘滯於天門頌曰歷盡關山道路辛這回金榜喜題名男兒志氣誰能禦駟馬榮歸自在行東斗主算西斗記名北斗落死南斗上生中斗大魁總監衆靈青帝護魂白帝侍魄赤帝飬氣黑帝通血黃帝中主萬神無越東斗九星斗中生氣故主生算西斗五星斗中成形故主記名北斗七星斗中司命故主落死南斗六星斗中司禁故主上生中斗五星斗中大魁故總監百骸衆靈也夫人之修學必得五斗標名然後降神守護乃得成道此天尊救攝以保學人也斗中之極各有一帝五帝在天則總御三界制主萬神不使過越分度若降氣在人身中則往返三田調御五氣故青帝治肝而護魂白帝治肺而侍魄赤帝治心而養氣黑帝治腎而通血黃帝中主於黃堂制御百骸萬神不使錯越也且氣清而上者曰天陽氣之濁而下者曰地陰其中曰靈陰陽之道上中下三分其用則一五方五臟各傳一氣交合為一凝而成真號曰靈寶故云五神安靜則萬氣流通三田升降則神靈純一神靈純一則與道合真長生不死此皆顯明靈寶為學人調神護道之事青天魔王巴元醜伯赤天魔王負天擔石白天魔王反山六目黑天魔王監醜朗馥黃天魔王橫天擔力五帝大魔萬神之宗飛行鼓從總領鬼兵麾幢鼓節遊觀太空自號赫奕諸天齊功青天魔王青面朱髮總統九醜遊空飛行是名巴元醜伯皆其隱諱也若降氣人身耗人肝氣使人喜愠不常赤天魔王負荷元氣撑主天地力可摧山是名負天擔石耗人心氣令人強暴白天魔王一首六目力破山嶽遊行三界遏人善功是名反山六目耗人肺氣令人貪恣黑天魔王形質獰惡監領小醜性好殺伐是名監醜朗馥耗人腎氣令人好殺黃天魔王常乘羽車飛行三界橫行天地舉唱謡歌惱亂學人是名橫天擔力耗人脾氣令人災病此五帝大魔即天王也現魔王相魔試學人人若識之與彼俱化其魔各現帝相升度爾身今以天尊開化度人勑攝之故於是飛行鼓從總領其下所轄魔兵麾幢鼓節周遊觀察於太空自行號令威靈赫奕與諸天等倫代天尊開化遊行乾坤掃蕩諸魔升度學人也頌曰名曰天王復號魔橫行天地破山河被豫識得渠名姓倒却旗鎗挂玉珂上天度人嚴攝北酆神公受命普掃不祥八威吐毒猛馬四張天丁前驅大帥仗幡擲火萬里流鈴八衝敢有干試拒遏上真金鉞前戮巨天後刑屠割鬼爽風火無停千千截首萬萬剪形魔無干犯鬼無妖精三官北酆明檢鬼營不得容隱金馬驛呈普告無窮萬神咸聽三界五帝列言上清以度人故嚴行檢攝三界邪魔也且北都羅酆有六天洞宫一宫各有一大魔王司之部屬甚多不可數窮耗人為事懺惱學人皆所致之故天尊攝之以保學人也神公者玉清丞相受天尊敕宣布號令揮斥不祥八威者巨虬獅子毒龍猛虎玄豹丹蛇麒麟巨獬吐毒而收邪天馬四布天丁前驅而稟命大帥仗幡而領行烈火一擲則飛揚萬里流鈴一震則交錯八衝敢有干試拒遏上帝真命則天丁執金鉞而前戮力士持巨天之斧而後刑屠割鬼爽如風而不停以嚴速故重云千千截首萬萬剪形魔無干犯而擾正鬼無妖沴而為精三官府署北都洞宫各明檢鬼營不容隱停金龍驛遞而傳行普告無窮世界三界萬神咸使聞知如是掃蕩既畢然後三界諸神五方五帝言功於上清此皆天尊制教為學人掃魔衛體之事人若內境融寂神靈咸布入大定相則萬邪不干魔試消滅矣頌曰學道須憑慧力多清江母或漲風波融心直入丹霞外滿目戈矛奈我何元始無量度人上品妙經注卷中
