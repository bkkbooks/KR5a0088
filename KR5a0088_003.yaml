front:
  text: 元始無量度人上品妙經註卷下来三
  hash: sha256:de761273a99cdfce8103eafd948f17a512ce0ef8bd81d051203d3b303909017e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0088_HFL_003-001a, image: hfl/0041/0041-005.png}
body:
  text: 東海青元眞人註清河老人頌浄明道子郭岡鳳參校并讚元始演法鍊真保度章衆生執相難造玄微故重演混元顯陳模範也參校曰此青元註經表二章之第二也天地運度八十八言前者制魔護道今當再肇生成的彰靈寳作用參校曰此青元註經條分八事之五也元洞玉曆龍漢延康眇眇億劫混沌之中上无復色下无復淵元洞者元始大洞之祖炁也玉曆者大洞啓運紀述天眞功績陞降及劫運度數之事也始於龍漢終於延康天地生成幾成幾壊莫可記憶故云眇眇每一劫壊則天地蕩散山海消融物象一空无復形質但元洞之炁混然不分沌然始構者也故云混沌當此之時暗包眞一之水而五行未胚故上无色象可見下无淵極能窺風澤洞虚金剛乘天天上天下无幽无冥无形无影无極无窮溟音茗涬胡頌切大梵寥廓无光風木也澤水也上風下水空洞虚无隨炁扇潤而金剛之炁乘載天根天地之形於斯始見幽冥者隱顯之謂也形影者物象之謂也窮極者分際之謂也溟涬者曠蕩之謂也當其混沌之中天上天下塊然无形孰有隱顯物象分際之别惟大梵之炁溟溟涬涬自成其功寥兮廓兮未有光影及後金風之炁相摩乃生其火四象化合土自生成博載天地長養萬物爲造化之主也五行既判二儀始分於是陽炁上而成天陰炁下而爲地即五行相生天地之道也且三境高眞過度灾劫如閲世之春秋易於反掌而衆生沉滯生死輪轉无窮亦如是也赤明開圖運度自然至赤明元年大運啓圖玉曆定紀天地再開於是天地日月星辰山川物象一時分判晝夜寒暑四序推遷各得其所岡有差忒故云運度自然凡世間一甲子爲一小變一百年爲中期五百年爲一大變十變爲一小劫三小劫爲一大劫此億劫之例也混洞之炁降兆生成五行返覆爲天地之終始如人在胞胎漸分形識五臟布化以丹田爲基長養黍珠惟此爲妙假赤明之炁煆鍊成寳運度無差自然合道永作眞人不拘此劫運也頌曰乾坤劫運與人同變滅無常始復終惟有一靈眞寳物光明烜赫鎮無窮元始安鎮敷落五篇赤書玉字八威龍文保制劫運使天長存天地既立猶拘劫運元始乃觀梵炁之結形刻玉爲雲篆以鎮梵天已經火鍊故曰赤書著成靈寳之文具載妙元神眞道故曰五篇一以保制劫灾一以提拔下士俾夫學者悟其妙者入其妙悟其元者入其元悟其神者入其神悟其眞者入其眞悟其道者入其道然後盡妙合元盡元合神盡神合眞盡眞合道自然無毁無滅超出度數與天長存頌曰五篇文字隱玄功保制灾危鎮梵宫箇是赤書眞妙訣且將符篆作形容參校曰九品仙籙經曰昔混元溟涬諸天未分元始肇形五劫初化乃命梵元祖晨道君肇録天元運乘五劫故元洞者以成祖炁玉曆者以紀天元自一炁化分三因成九若龍若蜒蟠曲九道漠漠无極總九陽祖炁之元太上以運梵合炁開始青天元祖炁故東方得九炁以分天境劫號龍漢又合炁開南丹天元祖炁故南方得三炁以分天境劫號赤明又合炁開中黄天元祖炁故中央得十二炁以分天境劫號上皇又合炁開素靈天元祖炁故西方得七炁以分天境劫號延康又合炁開北玄天元祖炁故北方得五炁以分天境劫號開皇五劫既周昊天成象一炁混道八景流光八帝示形九霄分化故元始天尊命天眞皇人以玉曆紀元洞之初劫運流復之本諸天分境結元洞五陽之炁為玉曆以紀天眞天民劫運功績陞退之道明九聖九品之階今附見于此至如億劫年數考究未的蓋劫運大小不一年數亦不一有天地成壊劫其最大者也有大劫中劫小劫之分其年數多寡上天所祕經文所不載者非世人所能盡知故也混合成眞一百六十八言前明生成建立之規今則的指真靈孕寳運化之妙參校曰此青元註經條分八事之六也梵炁彌羅萬範開張元綱流演三十二天輪轉无色周回十方旋斗歷箕回度五常三十五分總炁上元八景冥合炁入玄玄梵炁者元洞一炁之所化先天地立爲大道根倏升倏騰自浩劫來彌覆三界羅絡諸天元始資之而御運天地賴之而生成兩儀既分物象咸布故爲萬範開張也梵炁爲元化之綱流演於三十二天如輪運轉自然无色界起周回十方綿綿不息從斗至箕左歷二十八宿躔度如是一周天應人間一歲之運天罡左旋五星右轉㑹合成功也二十八宿合日月五星故云三十五分也總受高上天元之炁八景冥然交合是謂玄功玄而又玄故云玄玄如生神寳章曰混化歸玄一高結元始王之義如人之身筋脉纏布百脉通流元炁徘徊一身受潤三田華素五臟清夷始得成眞頌曰梵炁從教左右旋須臾歷盡一周天可憐不費纎毫力直到華胥謁上仙玄中太皇上帝高眞汎景太霞嘯詠洞章金眞朗郁流響雲營玉音攝炁靈風聚煙紫虛鬱秀輔翼萬仙千和萬合自然成眞玄者紫微天心玄都中宫也太皇即明皇道君上帝高眞即靈寳至眞也言玄都中有此上真當汎景太霞之上嘯詠大洞之章開度學人於是金真結而朗郁流聲響於雲營玉音收攝於散炁靈風混合而生煙徧紫虚而鬱秀乃輔翼乎萬仙故千和而萬合成靈寳而登真修真之士使梵炁回旋帝真在定金光朗徹流雲徘徊自然虎嘯風生龍吟炁聚大寳无不媾成也頌曰祖炁朝元玄又玄太皇面目儼然全風煙聚散神光定精鍊成容合自然真中有神長生大君无英公子白元尊神太一司命桃康合延執符把籙保命生根上遊上清出入華房八冥之内細微之中下鎮人身泥丸絳宫中理五炁混合百神長生大君乃斗中之尊星也太一桃康為領衛无英白元為輔宸皆斗中真人也執玉符定金籙保人形命主生化之根上則遊行上清高虚之表出入丹華之房周極八冥目至細微造化之内下則鎮人身宅或居泥九或住絳宫中則調理五運之炁會合百神也若降炁在人則爲内景之精光長生主心白元治肺无英居肝太一司命住腎合延桃康主脾符籙以喻氣血斡旋以保生根一則居臍所以調理五炁一則昇腦所以混合百神交合依時是名顛倒昇降得所是名返復故五行顛倒則大寳炁足三田返復則陽神上昇永爲眞人所以十轉回旋靈光徧體萬炁俱得而仙始超无漏如救苦經云天炁歸一身皆成自然人頌曰妙哉靈寳七般神上通天關下微塵運用只憑些子訣便超無漏作眞人十轉迴靈萬炁齊仙十者陰陽之成數也如乾九坎一成十坤六離四巽二兊八艮三震七皆合成十乃天地之大數變化之根元所以十轉迴靈則盡周天之極數自然靈光充溢萬炁還元各得其眞也頌曰周迴十過運三靈萬炁歸根混一眞這箇機關能解悟霎時天地變黄金參校曰經註條分混合成眞一百六十八言此皆靈寳度人鍊形了命之妙而青元註内又發明之道德經曰谷神不死是謂玄牝此内丹歸根復命之根蒂也蓋採藥而歸復入室而成胎舞蛻而脫胎昇頂鍊形而釋結解胞瘟養而氣足形充功滿而調神出殻老君聖紀有訓羽化神仙無令斷絶丹成而蛻蛻而騰虚御景身外有身是謂之仙近代紫陽張眞人一派有金丹四百字悟眞篇翠虚吟紫清文集等丹經口訣亦多顯露如潭底日紅陰怪滅山頭月白藥苗新歸根自有歸根竅復命還尋復命關卯酉甲庚須沐浴朔弦晦望每防危百刻寒温忙裏準六爻文武靜中看採藥沐浴火候抽添之眞機未嘗不泄於文字間但禁戒至重古今所同魔試相干堅定方可故必眞踐實履積行累功方能因縁遇合成就又如參同釋祖達磨形神俱妙隻履西歸之事實録中有胎息經略曰玄牝之門駐景之户若能兼行自然甘露蓋未嘗非道德經中旨也又有調神歌一篇與丹經調神之法合同其歌曰調神如嬰萬法无情恬如恬如神兮自寧調神如嬰寒暑枯榮治之覆之形神自貞調神如嬰啓合形神形神啓合如琉璃瓶中有金像虚實交并像喻法體瓶喻色身外不可染内不可塵像之與瓶皎潔分明不一不二如水澄停無濁無清水亦無形出不由户非功非程鏡兮若明萬像自形水兮若清月影自形非學所得非師所成如蟲食木偶然自成萬像之形如月之明萬法之名如谷之聲法本無法名本無名無名無法不起神形形神不起感之則生妄風不起神何不寧善聆若聾善視若盲智不如愚老不如嬰調之千日自然能醒惺中之夢夢中之惺明者不言言者不明有言則漏有漏不生日待朝昇我性常明月待圓成我體長形天食滋形含靈抱英醍醐之瑩牛頭之馨行一空味神怡體輕血化爲乳骨化爲瓊能獅子吼變野牛聲白毫生額金仙道成祖師之妙寂寂冥冥神不見形形不見神即心無心即形無形心尚不見此外無名形神無主舍識皆平誰健誰衰誰滅誰生誰喜誰怒誰怖誰驚誰念誰思誰辱誰榮如日昇天自行自明勤而行之祖師之程今附于此勸勉學士四百一十三言前明鍊眞軌範今則開示勤惰黜陟之白重伸勸勉參校曰此青元註經條分八事之七也仙道貴生无量度人上開八門飛天法輪罪福禁戒宿命因縁普受開度死魂生身身得受生上聞諸天諸天之上各有生門中有空洞謡歌之章魔王靈篇辭參高眞仙道好生甚於人之求生仙道度人常欲衆生不死而死滅之理人世自迷故太上慈悲區區至切所以上開八門下應八元自八門中進脩皆可昇眞入妙法輪者无上妙法之所運轉不息亦開示輪迴之道設以罪福之禁戒宿命之因緣皆警悟凡夫使超出苦輪而轉无盡法藏也於是死魂生身皆獲品度上告諸天隨念昇入諸天各有長生之門昇墜之格中隱空洞正音謡歌之章乃魔王之所述勸勉學人其辭皆與高眞參合也頌曰仙道區區度學人八門開設向迷津勸君只向生門入昇入諸天轉法輪第一欲界飛空之音此界天人以欲樂而墜故魔王述飛行虚空之道使離諸欲樂進入輕清故云飛空人道眇眇仙道莽莽鬼道樂兮當人生門仙道貴生鬼道貴終仙道常自吉鬼道常自凶高上清靈爽悲歌朗太空唯願仙道成不欲人道窮北都泉曲府中有萬鬼群但欲遏人筭斷絶人命門阿人歌洞章以攝北羅酆束送妖魔精斬馘六鬼鋒諸天炁蕩蕩我道自興隆人道甚微易失故也仙道莽大易證故也六欲染着易爲迷惑故云樂也欲之爲害當人生根仙道好度使超欲樂進入高空而天人欲根未嘗暫離仙鬼之道如君子小人各願爲其類相爲喜也是以仙道尚昇鬼道尚墜如善人爲善惟日不足惡人爲惡亦惟日不足爲仙道者常自吉慶爲鬼道者常自凶邪所謂吉者去欲而已所謂凶者愛欲而已唯高上至聖言辭清靈爽秀悲憫天人易入鬼趣故作空歌叙六欲之苦不欲其墜也北都泉曲者拘囚之所凡天人報盡乃入其境故云中有萬鬼羣但欲遏人年筭絶人命根欲染之樂其報如是天人能保人道深鑑鬼趣故稱阿人常歌洞章攝伏魔類斷絶六欲之根故云鋒也頌曰六欲原從暗裏來相牽鬼道可哀哉君還會得悲歌意束盡羣妖道眼開第二色界魔王之章此天自以色塵爲樂故述以玉清之道離色忘塵昇玄入妙落落高張明炁四騫梵行音衡諸天周迴十方无量大神皆由我身我有洞章萬徧成仙仙道貴度鬼道相連天地眇莽穢氣氛氛三界樂兮過之長存身度我界體入自然此時樂兮薄由我恩龍漢蕩蕩何能别眞我界難度故作洞文變化飛空以試爾身成敗懈退度者幾人笑爾不度故爲歌音此天落落然高張遠大明騫之炁四朗乃梵炁所化周布十方也无量大神即天中魔試之所變故云皆由我身蓋仙道好度出此洞章使人了忘色塵超出空有昇入三清而天人自以爲樂不知所向故云仙道貴度而鬼道常與相連所謂進則成仙退則成鬼進退之間人當自擇天地之間眇莽高大穢氣氛積色界雖樂尚有劫灾墜之下苦失之不難須得了忘塵染昇入三境乃可長存能度此界則眞相之體進入自然當爾之時不生不滅萬爲樂也我恩謂色塵良由超出色塵也龍漢謂玉清上聖之道蕩蕩無際皆可證之今爾等但以色界爲樂故眞偽莫分故化洞章以相勉也千變萬化魔試天人其間懈怠者多昇進者少笑爾不求自度故作是言也頌曰人言此界極難度我道色塵容易消但使自家心似鐵從教爐鑄火來燒第三无色界魔王歌曰此界天人以遣心故返爲所累故魔王述以匡御之道令識變詐使决證神仙三界之上眇眇天羅上无色根雲層峩峩唯有元始浩劫之家部制我界統承玄都有過我界身入玉虛我位上王匡御衆魔空中萬變穢氣紛葩保眞者少迷惑者多仙道難固鬼道易邪人道者心諒不由他仙道貴實人道貴華爾不樂仙道三界那得過其欲轉五道我當復奈何此界天人去色忘塵而未達究竟之道以遣魔故返爲魔累故天王陳匡御之法欲開悟之言此三界之上惟有眇眇大羅无色之宗但雲層峨峨而已下仙不可窺盻得元始之道居其中無有終始故云浩劫之家也統係玉京部制過此分界則轉玉虚之境魔王自言我居此天最上王位常匡御衆魔方保長存飛空之中千變萬化昇度學人而塵穢之氣常自紛葩也言天人雖則離染忘色未能遣忘尤以心識爲患至於觀空入妙尤復爲難故鬼道易爲邪入欲作眞人忘心自遣而已諒不由於他事乃爲仙道者以實爲人道者以華今爾等天人若不進登眞仙之道則三界何以超凌頌曰聲聲勸我御羣魔惟是羣魔直恁多要做神仙元自已若居鬼道不由他紀述功果一百一十七言前者以顯戒言則今明示所得决定功果以堅固學人參校曰此青元註經條分八事之終也此三界之上飛空之中魔王歌音音參洞章誦之百徧名度南宫誦之千徧魔王保迎萬徧道備飛昇太空過度三界位登仙公有聞靈音魔王敬形敕制地祇侍衛送迎拔出地户五苦八難七祖昇遷永離鬼官魂度朱陵受鍊更生是謂无量普度无窮如上歌音者乃三界之上飛空之中魔王之所製也其音參大洞之章若人誦之百徧亦如天人離塵絶欲故得名度南宫誦之千徧亦如天人觀空入妙是爲道備飛昇太空仙公者太極第一品之仙眞此則誦經功德所獲如是其有聞見者次獲如下功德魔王敬形敕制地祇侍衛送迎拔出地户五苦八難雖七祖皆得受生如是生死兼濟故云无量无窮有祕上天文諸天共所崇泄慢墮地獄禍及七祖翁此經盡天地萬有聖腎資生皆所總言故劫以四萬之遠方許傳度恐下士輕易重設禁綱而爲偈頌曰三炁氤氲結大羅述成音韻作空歌天尊說法本无法豈是人間筆舌多道言此二章並是諸天上帝及至靈魔王隱祕之音皆是大梵之言非世上常辭言无韻麗曲无華宛故謂玄奥難可尋詳上天所寳祕於玄都紫微上宫依玄科四萬劫一傳若有至人齎金寳質心依舊格吿盟十天然後而付焉聖賢隱奥下仙不可窺盻得眞道粗識其詳有志以金寳質心方許傳付祕禁之科不可輕犯後世淺識之士妄有改易及傳非其人者宜省斯言頌曰玉臺深鎖印金泥雲錦龍文祕紫微四萬劫來方一遇學人曾敢怠脩持道言夫天地運度亦有否終日月五星亦有虧盈至聖神人亦有休否末學之夫亦有疾傷凡有此災同氣皆當齊心修齋六時行香十徧轉經福德立降消諸不祥无量之文普度无窮未得眞道之士否泰吉凶故常理也後學心未堅固乃設此章以天地聖賢不逃大數而況後學者乎博達之士三省斯言自無魔試同氣者自清濁分一生二二生三三生萬物品物流形均受元始一炁而生人人皆是同炁頌曰霄壤神人或異常凡夫安可没灾殃同心發箇度人願十讀斯文爲解禳道言夫末學道淺或仙品未充運應滅度身經太陰臨過之時同學至人爲其行香誦經十過以度尸形如法魂神徑上南宫隨其學功計日而得更生轉輪不滅便得神仙末學之士未遂成道則仙曹未有名籍遇數則終形識當壊不免同入太陰返視陽仙誠隔霄壤若同學之流爲之濟度方得返形爲陽頌曰學人脩道冀登眞逐妄翻成墜苦因若也同儕垂濟度南丹即日鍊魂神道言夫天地運終亦當脩齋行香誦經星宿錯度日月失昏亦當脩齋行香誦經四時失度陰陽不調亦當脩齊行香誦經國主有災兵革四興亦當脩齋行香誦經疫毒流行兆民死傷亦當修齋行香誦經師友命過亦當脩齋行香誦經夫齋戒誦經功德甚重上消天災保鎮帝王下禳毒害以度兆民生死受賴其福難勝故曰无量普度天人自利利他爲第一行太上設此一章明此經非惟度已雖天地君臣民庶皆可兼濟方爲道備乃顯度人之普頌曰學人脩習洞玄章慈愛之心不可忘爲國爲家兼濟度度人功德始无量道言凡有是經能爲天地帝主兆民行是功德有災之日發心脩齊燒香誦經十過皆諸天記名萬神侍衛右别至人尅得爲聖君金闕之臣諸天記人功過毫分无失天中魔王亦保舉爾身得道者乃當洞明至言也宗奉禮敬輕泄漏慢有一至此則鬼神所不容私而況諸天乎太上以世人之志成毁無定故云諸天記人功過毫分无失前章已是誦經威儀今復以四種美功重伸優勸皆諸天記名者隨功紀籍萬神侍衛者靈寳衆神也友别者五帝以友别之稱爲至人尅得爲聖君金闕之臣者即爲後聖金闕之侍臣也頌曰學人志念若浮漚勤惰難爲定性求若也洞明靈寳語上清即日可遨遊諸天中大梵隱語无量音元始靈書上篇東方八天廣生高映覺元洞虛應玄九眞化交肇圖文靈運構宗範玄都感變總括威昭自成緑岑遷景皇道含明天琳耀權炁精育魂融羅負立圓英隱旻期巨神包洪綱吿寧南方八天章炎通泛堅敷澄宗虚象玄華龍陽儛穹微正霄艷淵太凝冲元關三紐太梵飛空隱覺隆益天倫慶呈神户纏絡眞元散精浄握冥昭回合陞遷導騫宴雲靈應騰天西方八天剛澤徽控陰峻孤儀貫炁明素宸洞開微周化幽應澄虚帝臺平遐揖虚恢茂童池結飈臨育麗無散開陽通百六沉芒隱階幽廓冥默峯眞會靈堅丕順道吿命騫林北方八天龍安洞變純陽隱玄方本還炁象伏高員神變慧化解鍊靈根赤精純道成號威尊利雲友常億劫中丘鬱城瓊壘謡音慶流受位玉室大憲通幽玄章煥落綱輪迺周上篇龍章鳳篆之文亦名除禳水火漂溺玉章參校曰青元經註引天公經云大羅宫有上篇觀覺鬱繿者龍篆正文謂此也蜀本叙在靈書下篇後但旣曰上篇章篆合置上篇之列别本已有置此在上篇後者今從之觀覺鬱繿太明紫靈九神度魂開關玉眞阿奕煒燁飛天流音輪景帝常都靈頤臻豁落大有慶雲啓靈七曜輝魔恬懀敷榮虛无上首天啓彌宸四吁育象濯曜騰精煥赫洞陽浮景玉光七靈謡歌世元紫堂羅英散景耀明玉房八景總獸韶王攝精九都騫鬱飛生上靈密羅浄境馥郁空輪灌沃黄華霐運玄明神宫開朗延宛丹庭大猷浮景眞定化元蜒宛素眇玉梁澄烟蕭峙結嵎景羅七纏秀盤三府流輝九玄寂然虛邈飛華拂軿晨濫録籍太漠由延阿丘九度六龍儛轅蓊藹浮羅紫精馥淵溟涬太育九機化乾覆形厚德元河瀹精育英明陀景辰眇雲大隗總監秀樂禁天紫虛陀丘劫量交前碧霞韻梵眇眇遊元六變運量馘絶惡愆恢寂玄漠萬度成仙元始靈書中篇道君撰天公經云雖有諸天猶拘劫運於是玉宸道君撰元始靈書四篇凝雲作篆每字方廣一丈八角垂芒以鎮三十二天大羅宫有上篇觀覺鬱鑑龍篆正文中篇即此文也道君所述下篇即森角儲雲乃皇人美此隱音重述之也東方八天叩齒九通思九色玄龍導引從前後青雲九重覆匝身形密呪曰赤明開圖九炁迴眞總統元關青帝大神流化九外纏綿我身靈音八書六十四篇洞明天地與我合仙運致龍駕上昇帝軒呪畢引炁九咽止亶婁阿薈无惒觀音亶婁即玉京山上長樓也阿者此天司候之神名阿那薈者天中遊冶臺名无者虚无惒者日月之户觀者觀覺天帝之諱音者歌音謂玉京亶婁其勢長大上接玄都之阿每朝會時阿那登此樓擊大鼓則諸天眞聖皆集歌洞章自日月尸間朝元始于虚无也然後天帝觀覺領眞人登遊冶之臺三唱洞章以開度人天此則元始以鎮黄曾天之雲文須延明首法攬菩曇須延皆天眞之諱明首先聖之名法攬菩曇即玉清四府眞人也當大劫交元始命須延開玉眞之府納諸仙眞明首主持正炁開導諸天梵炁於是元始散遊諸天則法輪引籍攬覺度魂菩提轉輪曇頤揚幡自是九地開光學人受度此則元始以鎮玉完天之雲文稼那阿奕忽訶流吟稼那此天中掌籍眞人阿奕此天苑圃中瓊林寳樹之呼忽者飛天神王名訶者元始消息之稱流者流布吟者吟詠當劫初時元始於阿奕之下嘘呵元梵之炁自成靈音流布萬天皆得吟詠然後稼那舉籍定是非死生上奏玉京即飛天神王下度世人也此則元始以鎮何童天之雲文華都曲麗鮮菩育臻華即東極青華之都曲者歌曲麗者玉女之名鮮者慶雲之象菩者此天中寳樓名也育者帝諱臻者至也謂元始時於華都命仙聖領諸玉妃登菩樓歌洞章則鮮雲集其上於是玉帝乃臻開度九夜此則元始平育天之雲文答落大梵散煙慶雲答落謂此天中宫闕巍巍上有答落之庭大梵元始宥令之稱散煙慶雲乃北天梵炁之餘者也謂元始開大赦於荅落宫庭收攝元炁放釋罪魂咸得餘炁復元結成雲煙而聚集此則元始以鎮元明文舉天之雲文頌曰阿那登樓嗚法鼓洞章三奏日月户元始遊行轉法輪登命須延開玉府嗟呵之炁成玉音流布萬天得歌舞天君王妃登菩樓煙雲摇曳舒玄素荅落宫庭大宥開无量衆生皆受度飛灑玉都明魔上門飛者飛天神王灑者迅速之狀玉者玉眞都者酆都明者明曉魔者魔王上者上帝門者門下也謂元始爲諸飛天神王演說正道自龍漢之劫至于延康一一灑然學人能明曉其音則玉眞開長夜之府酆都度八難之魂魔王保迎上帝育神門下天眞欣然保度此則元始以鎮摩夷天之雲文也无行上首回蹠流玄行音莖蹠音隻无者虚无行者運行上首北帝下宫之名回者回轉蹠者履蹠流者流晨之華玄者空也謂元始禀虚无上道綱維八極使梵炁流行下環北帝宫以彌羅諸天運推數極則大劫交至初則元始復以流晨光華履導空虚而布化玄者玄空此天有空峯山乃生死所歸學人道未備足身應滅度其魂升入此山俟功滿德足然後轉入南丹鍊度此則元始以鎮越衡天之雲文阿陁龍羅四象吁員阿者此天中之山名九折連阿而上陁者山上樓名龍者亦山名與阿陁相去九萬里羅者日月之呼四者四極象者象車吁者南昌上帝隱諱員者日中仙童之名謂阿山陁樓其炁與玉清相屬此天帝君常遊其上察人罪福日月之光照于上學人道備則四極眞人乘象車而下度其身引領而謁南丹吁帝以求鍊度日中仙童仍以九陽金精之華灌濯其體此則元始以鎮蒙翳天之雲文也南方八天叩齒三通思朱雀鳳凰翻翻直前後絳雲三重覆匝身形密呪曰三炁徘徊靈鳳來飛玉音八字爛煥紫微吉日大慶我道洞開朱丹哺飴仰吸靈暉身生水火絳帔羽衣登空飛歩足踐丹梯周旋八天七祖相隨呪畢引炁三咽止南爓爓音艷洞浮玉眸詵詵南者南方丹天世界爓者火焰洞者洞陽宫也浮者浮沉玉眸者火之膏質詵詵者盛也謂南方丹天有洞陽宫流火之庭火焰飛浮洞煥八方玉眸之質光明交映詵詵然何其多也乃眞人鍊形之所此則元始以鎮和陽天之雲文也梵形落空九靈推前梵形謂元始從劫至劫歷代化生皆以大梵之炁凝而成形以一神而現不受胎生從空而生故云落空九靈者玉都九華眞人推前者此天中臺名眞人常奉天帝散花其上嘯詠洞章開度天人也此則元始以鎮恭華天之雲文凙音托𠗂音鶴菩臺緑羅大千凙者天中山名洛者神眞道君諱菩者飛天眞人内音臺者玉臺在凙山之陽緑羅者月宫夫人内音大千者世界劫數之稱凡百至千曰一千自一千至再千曰小千自小千至再千曰大千謂凙山衆龍所伏中有黄房之宫洛君居其中自劫至劫不滅不生時領諸菩登玉臺歌洞章以度人緑羅字羅英其形如玉美瑩無艷乘大梵炁理治太陰度數以應天元無有差忒至大劫交則日月俱會於玉臺俟劫運再開復運化也此則元始以鎮宗飄天之雲文頌曰浩劫由來元始王龍漢說法至延康開明无上眞道炁連環運轉維八荒學人道備功德滿拜謁吁帝登南昌玉眸黄華光四映火鍊魂神應九陽始乎元始下生界梵炁結形空裏翔凙山眞人得至道不生不滅居黄房經緯天地日與月亘大千兮莫可量眇莽九醜韶謡縁邅眇莽者混沌之狀九醜者大力鬼獸韶者魔王内音謡者瑶歌縁者南斗之别名邅者北斗之别號謂天地未分其狀眇眇莽莽九獸之鬼齊天而生應天度九九八十一萬數數極而劫交此鬼號爲九都使者元始使輔三官同考生死韶者神霄宫魔王謡歌惱試學人若心堅固保舉之司詣南北二司係仙籍除死名次入此天之金華山謁太乙帝君求合同符契乃得遊宴諸天此則元始以鎮皇笳天之雲文雲上九都飛生自騫雲上者飛天神王内諱九都者九玄之都玄臺之别名也飛生者更生大神之名自者從也騫者騫林也謂雲上散百和名香流五雲之華執太眞玉印十絶靈旛一日三回回旛一周則諸天上帝齊到壇下遶壇三匝誦詠洞章然後開度若人識此歌音則更生大神爲開不死之路流長生之炁鍊其五魂五魂旣鍊則八景存焉從而保舉入玄臺遊騫林矣三十四年畢元始命下乃得南丹鍊度此則元始以鎮堂耀天之雲文那育郁馥摩羅法輪那者此天天王侍郎之内名育者天闕空輪郁馥者斗中靈童内號摩羅者天中魔王法輪者大法之輪也謂那主四時之炁運大法輪正天分度罔有差忒數極則劫交然後魔王歌洞章之曲而度應受度人天輪十轉足則諸天上帝三界萬神俱至郁馥唱禮一唱萬神齊禮魔王束形此則元始以鎮端靖天之雲文霐持无鏡攬姿運容霐者龍淵之神都監之内號持者龍淵之名也无鏡者飛天神王名也攬姿者三界天門之名運容者玄和玉女異號謂九龍伏于持淵常含金甖而運東井黄華之水以灌濯於天人學人成道无鏡爲開長夜之府昇度其九祖同過三界天門然後運容玉女以朱陵之炁引導其魂玄和之津灌注其體此則元始以鎮恭慶天之雲文馥朗廓奕神纓自宫馥朗者天中玄臺山名廓奕者天中神公之内號神纓者紫微靈童名也宫者紫微宫謂廓奕神公與元始同生爲玄炁之祖常與此天帝歌洞章於馥朗之上然後眞人爲開度學人神纓導引自紫微宫而朝元始此則元始以鎮極瑶天之雲文頌曰學人欲謁金華眞謡歌不試胡爲成况復飛生流道炁鍊濯五魂澄百神那兮運輪魔敢犯朗馥一唱束萬形无鏡時開長夜府九祖俱沐玄和津廓奕猶歌洞章曲直造紫微朝玉宸西方八天叩齒七通思白虎獅子導引左右素雲七重覆帀帀身形密呪曰七炁金靈八天尊神白虎策輦獅子捧轅七炁纏綿鍊我成仙身發金光映照素靈内外變化昇入洞門七祖出夜九幽放魂億劫開度隨運長存呪畢引炁七咽止刀利禪猷婆泥咎咎音高通刀利者南方世界之號襌者國名襌黎也猷者好生君内名婆泥者洞陽宫靈童名也咎通者天中魔王内諱謂刀利世界襌黎國土有洞陽之宫元始於此火鍊眞文眞文旣經火鍊光明瑩徹洞煥萬天然後此世界爲大福堂一切罪魂咸令昇入若人成道猷君監眞婆泥鍊魂而度命咎通常遏絶生門若明此音則衆魔奉焉此則元始以鎮孔昇天之雲文宛藪滌色太眇之堂宛藪天帝内號滌者滌蕩也色者色界也太眇之堂者乃天中大福堂也謂皇崖天帝主開太漠之經理治天炁每領諸眞遊行色界諸天出入上清之府蕩滌穢氣保持此界之天開度善信之人若諸天人行業高者則天帝昇之得乘景雲之車上生太眇之堂乃天之祕府中隱大洞自然之章此則元始以鎮皇崖天之雲文流羅梵萌景蔚蕭嵎流者天王名也羅者月女之諱梵者飛天眞人名也萌者元始天王之名景者景皇乃四極上眞蔚者蔚秀乃景霄仙人簫嵎者劫仞之宫謂流君時遊九霄月皇遊宴之儀飛天眞人開九天之關萌君正梵炁開度天人保固極風之根又簫嵎者乃西方白素元君之宫景皇蔚秀開治其中學人明識其音乃可以馭丹龍之轡昇九色之霄陟九皇之臺此則元始以鎮極風天之雲文易邈无寂宛首少都易邈者始皇天帝内名无者虚无寂者庭名也宛首者太上道君内諱少都者日中仙童名也謂始皇天君自龍漢而來至于赤明居虚无之内處寂寂之庭奉道君開元始之奥演大法以度人靈童少都仍散日華之精以灌眞流飛霞之輝以拂塵此則元始以鎮孝芒天之雲文阿繿繿即濫郁竺華漠延由阿濫者天帝隱諱郁者魔王郁默之稱竺者謂欲界也華者謂色界也漠者溟漠也延乃束鬼之庭由乃禁鬼之房謂郁魔之衆惱亂天人或居色界或居欲界隱現於光華之内眇漠而不可尋究帝君阿鑑登九層之樓歌洞章以攝之於是衆魔應響而束身羣鬼詣由而伏形保愛天人也此則元始以鎮浮容天之雲文九開自辯阿那品首九開天地大衍之數自者自然辯者明辯阿者天帝内名阿丘也那者那邪飛天神人隱名品者品量首者衆首謂大衍之數天地未判三炁混沌開爲九分九度九度旣開然後陰陽男女别自然明辯也又帝君阿丘常登龍山遊九玄之都赦諸那邪遊空開度善根之人品度其魂昇入飛仙之上首此則元始以鎮江由天之雲文頌曰眞又火鍊光瑩徹无量罪魂昇福國皇崖帝君遊諸天昇出天人齊行業流羅梵萌持九霄極風之根無散滅赤明教主曰道君開玄演法以度人郁魔隱現不可尋一聞洞章皆伏形戒爾衆生脩善行昇入飛仙第一倫无量扶蓋浮羅合神无量者此天大聖尊神扶者更生君内名蓋者此天有蓋宫浮者幽魂之呼羅者大羅合者合慶神者神公謂无量尊神總統飛天神人皆受品量而昇進之更生君主長夜之録定善惡之根開大千世界度諸幽魂昇於大羅諸宫與神公而合慶此則元始以鎮阮樂天之雲文玉誕長桑栢空度仙玉誕者天中玉都之别名長桑者扶桑之林栢空者洞章之音度仙者度人成仙謂玉誕有騫木扶桑之林蔭覆諸天其葉上皆紫字玉書大洞之文每神風吹返魂之草桑林鼓百籟之音自成空歌之曲故曰栢空靈雞棲於其上一嗚則天下羣雞皆應聲而嗚於是青霞扶摇太陽乃昇故諸飛天神人以雞嗚之初登玉臺採五方雲牙吸嚥三晨之光同度學仙之人此則元始以鎮曇誓天之雲文北方八天叩齒五通思飛龍羽蓋蓊鬱左右黑雲五重覆帀身形神童玉女羽衣飛裳侍衛身形密呪曰玄天徘徊流景上清大有啓運八字開明飛玄澄空洞陰自生五炁纏綿灌我身形冠帶北單受鍊洞靈腎府仙化内外光精飛行三界遊宴紫庭七祖同慶歡樂劫齡七寳林中反胎更生長夜出離南宫記名黄籙白簡世世生仙呪畢引炁五咽止玃无自育九日導乾玃无者飛天神王内名自者從也育者即天帝内名九者九玄之都日者日童也導即引導也乾者天常也謂玃无從龍漢溟涬之間乘運而出時與育帝乘鳳車遊九玄之都轉九機之度以應劫運之數日華童子仍開導和炁俟劫交則日停光而運化此則元始以鎮霄度天之雲文坤母東覆形攝上玄坤母者太陰都候九靈仙母東者東海覆者理水大神形者地機之形攝者召也上者上言玄者玄都謂九靈坤母治東極扶桑暘谷之淵總持地機旋轉元炁以天關地機轉動一周則水涌溢三千三百度度極則天地炁交九海混一衆水彌天覆神治崑崙之頂主填涸巨海遏斷東井之源使地機不淪如劫數終則坤母出東井召鳥母於龍門制會河源上詣帝前申告劫會仍以大鳳之車陞載學人昇于崑崙以朝玄都此則元始以鎮元洞天之雲文陀羅育邈眇炁合雲陁者飛天神王之名羅者月光之稱育者妙成天主之諱邈者羽林監神名眇者眇眇高遠也炁者雲炁合者合景謂陁與育俱生於雲阿之嶺抱月之光總持羽林軍時敕邈神遊行三界保度得道之人令詣羽林受符信羽林在北自與諸天合景眇眇然行於雲宫結雲炁以為衣此則元始以鎮妙成天之雲文頌曰阮樂天君无量尊開度長夜出幽昏神風飄飄吹返魂柏之空歌皆洞言靈雞初嗚扶桑端眞人採集雲芽餐玃旡乘運應乾元旋轉九運保天根劫終鳥母會龍門學人乘鳳昇崑崙羽林受符拜新恩雲衣縹緲朝帝軒飛天大醜總監上天飛天者飛天神王大者都録之司醜者宗伯總監者總是飛天都統之官監是領長夜之官上天者升上天中也謂飛天神王總治天地之運爲三界之宗三界魔王皆受事於其府總主領八㑹之炁監主録長夜之魂乘其命而昇度幽魂於諸天此則元始以鎮禁上天之雲文沙陁劫量龍漢瑛鮮沙者此天有沙蘭宫陁者陁丘山劫量者隨劫詮量龍漢者始劫之名瑛者飛天神王之諱鮮者日童名也謂沙蘭宫陁丘山乃紫微之別館係玉清新得受度而功未圓者常有巨萬人停散其中皆龍漢時人俟劫交則詮其功而詣上宫人能明此音則瑛君度人沙蘭鮮童引而鍊形此則元始以鎮常融天之雲文碧落浮黎空歌保珍碧落者碧霞落落浮黎者天王内諱空者天中侍宸之名歌者大洞之歌保者保持珍者珍愛謂玉隆天常有碧霞落飛天神王乘碧霞之輦一日三回引導天中諸聖上朝七寳謁帝君而稱慶於是侍宸一嘯靈風扇而成大洞之歌保此天人不拘劫運此曲尤爲天人珍愛故曰保珍此則元始以鎮騰勝天之雲文惡奕无品洞妙自眞惡奕者天帝内音无者太无眞人品者品量洞者洞明妙者此天有福堂曰妙化自者與也眞者合眞謂惡奕天帝自元始祖劫脩行超出三界位入玉虚故得證大聖之位至赤明開圖元始錫爲梵度天王時勅太无眞人開長夜之府品度罪魂使了然洞識宿命浄盡惡根昇入妙化之堂與道合眞矣此則元始以鎮梵度天之雲文元梵恢漠幽寂度人元梵者元始大梵風澤之炁恢漠者廣大之辭幽者幽寥寂者虚寂度人者度无量人謂元始大梵之炁恢漠无窮高而洞浮懸而不落妙不可名幽兮寂兮不可見聞其中有眞眞中有精冥度天人此則元始以鎮賈奕天之雲文頌曰學人能識大洞章三界魔王爲録姓新受度者昇陁山劫終品量騰三景飛天遊宴昇碧霞導引天中諸大聖一日三朝七寳宫玉隆帝前自稱慶太无眞人度罪魂普度洞然知宿命巍乎成功不可尋元梵恢漠惟溟涬幽兮寂兮離見聞中有眞精精甚信度人濟物妙難名故曰隱語无量音道言此諸天中大梵隱語无量之音舊文字皆廣長一丈天眞皇人昔書其文以爲正音有知其音能齋而誦之者諸天皆遣飛天神王下觀其身書其功勤上奏諸天萬神朝禮地祇侍門大勳魔王保舉上仙道備剋得遊行三界昇入金門言此者梵炁所結隱祕之文上能保鎮天度呼召天仙下則利益生民開度苦爽故曰无量度人也舊文者乃元始觀梵炁流注之跡合而成之字皆周回一丈薄於太虚每八字爲一天炁之根凡諸天劫運成毁者亦由字之散合所致也雖高聖莫曉其字乃命皇人書爲正音然得天仙則識之大勳魔王保舉上仙者都領三界之尊神保舉學人昇入上仙品秩俟其道備即得遊行三界拜謁金門頌曰大梵靈章隱祕文皇人改正始流傳齋心誦處諸天悅即得昇騰作上仙此音无所不辟无所不禳无所不度无所不成天眞自然之音也故誦之致飛天下觀上帝遥唱萬神朝禮三界侍軒羣妖束首鬼精自亡琳琅振響十方肅清河海静默山嶽吞煙萬靈振伏招集羣仙天无氛穢地无妖塵冥慧洞清大量玄玄也前後標叙可謂盡矣今此復以結歎靈寳所感功德一十四事書于卷末者蓋欲成就大洞之功也冥慧洞清又爲靈寳四種聖功冥者冥契一切慧者慧照无窮洞者洞觀十方清者清浄致極皆靈寳之道備所獲全德也大量玄玄者道君感歎此經利濟普博妙不可名也又匠成萬物而不言我爲者玄之德也玄而又玄衆妙之門故云大量玄玄也頌曰三洞諸經貴玉音文章錯落燦珠金保天鎮地禳災厄度盡塵沙無鞅人參校曰靈書中篇乃三十二天保鎮開度之梵音誦詠宣揚功用莫大而三十二天又爲天人學人脩證陞進等級之品三界有三乘之分種民入上乘之最性命混融與道合眞故道言成終總括又以冥慧洞清表之且申以大量玄玄者亦備述大乘與上乘玄覺之妙歟贊曰大象冥冥至玄之名冥合玄玄視而无形窈冥有精梵炁深凝寂兮寥兮合道混成何以言慧至神之義正慧自然神光所麗无幽不燭无之不遂自然而然如是如是何以言洞眞空之謂天中空洞載在經㫖纎毫无滯貫徹表裏空无所空洞然而已何以言清眞一之稱道德經曰得一以清生一之始大羅玉清純清絶點歸于无形冥慧洞清四者之全空玄妙混玄之又玄空有兩忘无无亦然其太上洞玄靈寳无量度人之極功歟元始靈書下篇天眞皇人撰東方八天森角儲雲九魂鍊精枳默窺玦浮枚曰𨀛鹿幾揚房碧提酇回池滇黨負跂逭謁攜藻章變瑜蘭泮碧環亢傍野生極中昆清耀展洞涸寂无妙凝素倚虚羅皇達元靈南方八天炎鍍綽堂太霄瑶隅歷遐薦倚周扃加圖披嶢蹊臄觚亶渾都戟芸荼炫井欺持蒲掌維迮儀奕晃琅璀扁縷益但幽微畢雷涓湟寔東赤曜叢稽玉玄演侯柏璖至規西方八天鎬正左適婆尼煞靈悲招均疆洎南躔魁靜夷損光混元覺縁道守岑遥綿徴知宣太靈湮漠昺和盧隨哲京常華墟咸堅沙栗鐸黜株會衍球裴卓雲青府業睹般基北方八天洼孩蒙甘翠宇九闌蕭鈎漣興龍汾神關溝淪泬魔豁蠻祈通玄寥亢息無知肆明蟒脩吉夕馥壇時畎湯長敷昌匪庸謹濟朝康堲寬祕法侈宜廣帝理生衛肇宏人天眞皇人梵炁玄遼天寳自然八合之音主治世會地壘洪澤變灾厄難誦詠之者禳辟妖祥清靜道炁无不寧也地官奉書百靈畏敬神朱寫文服佩明驗施之於至學不宣於下俗也太極眞人頌神雲煥層虛梵羅屯碧霄元始九龍駕皇人按青軺靈光集萬眞珠影開陽寥出示靈寳篇福德由是招洞玄隱高嚴玉音泛雲璈无量匪得思道海生波濤法義同涓流滋植成嘉苗用以賬窮饑教興衛中朝帝尊壽億年太平滅兵刀稽首望玉宸靈華散金毫參校總贊曰太上眞經无量度人人所以生父母之身始生之根與天地均同禀梵炁聚精生神凡軀所累六根六塵三業所毒首曰貪嗔逐流忘返浸失善因天尊慈憫弘濟天民性命妙混經典開陳復歸其根不墮轉輪妙經初宣道性爲先静默朗清眞淨本源高下平等不間山川玉相純色皆表性天空玄之中寳珠之懸眞源旣證眞空又全寂无遺響盡歸忘言何以了命鍊炁成仙中理五炁得玄牝門百神混合十轉胎圓蛻凡而眞體入自然所以致此功行兼焉行滿八百功足三千諸天記功毫分不愆魔王界中明炁四騫懈退有戒金石非堅保舉爾身飛行翩翩空有俱寂染習絶源超過三界玉虚高遷依經行持得魚之筌道子作贊莫盡玄玄天恩覆冒普度无邊元始無量度人上品妙經註卷下誦度人經應驗杜三師脩誦經驗閬州天慶觀道士杜延眞精心脩行常持誦度人經以衣鉢脩經庵石老君安龜像之座滿堂盡繪經中出相嚴潔無怠年七十八歲一日忽謂衆曰爾不樂仙道三界那得過大衆暫别各保歲寒言訖屈膝跪化旣葬之後塚上常有白光居人異之其諸徒共視則塚有一穴而尸不見止存雙履而已然衆亦未曉忽有人自成都來云杜三師有書啓緘視之乃云傳言石太上勤謹視鄉龜此謂石老君也此則方悟尊師已獲尸解矣劉氏女誦經驗紹熙間果州居民劉氏有女年七歲一日有道人誦經縁化因白父母曰此所誦者何經答曰度人經女子敬欲受之父母從之不旬月悉能記憶日夜誦念不歇一日西鄰大火其家正在烈焰中人但聞誦經聲不歇將已爲灰燼俄有大風回旋火勢遂過劉氏一家了無所害豈非經中神明護門之驗耶因鏤板印施以傳之王明聽經驗慶元間梓府寳珠㑹凡遇誦經有跛者王明策杖常至聽經一日聽經至十方无量度人處似有壯力拽其脚視之不見遂棄杖而歸人問其故明曰予二十年聽經方知四徧說經跛痾積逮皆能起行之驗張將仕誦經驗淳熙間閬州東街張將仕晩年從黄冠受度人經每旦夜齋潔炷香調聲正氣轉誦數過凡三十年忽一日謂家人曰爾等安知吾學尸解之道尋即果捐一館時年七十七歲公丁亥生既葬再越月復值丁亥日忽於凡筵灰燼中産蓮華九莖色甚鮮白脩纖踰尺因命親族聚觀共相嘉歎越三日華乃萎根植宛若因閲經藴則有欲生因蓮華之句方悟其事後有子辛於嘉泰甲子與鄉薦今爲望族任炤誦經驗合州石照縣吏任炤於嘉泰間因目疾喪明遂棄職誦度人經以求痊忽一日雙目頓明於是愈加勤恪發大誓願將度人經寫成元始天尊聖像刊行首以化導本州天慶觀化道藏及藏經功德不日落成以是觀之豈非經中所謂説經二徧盲者目明之驗歟
