front:
  text: 元始無量度人上品妙經注卷下來三
  hash: sha256:2fe7e73267da5ab5bd9a5d57c7f65fabc18a86459503e4aee96cfe76c1a918e7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0088_HFL_003-001a, image: hfl/0041/0041-005.png}
body:
  text: 東海青元真人注清河老人頌淨明道子郭岡鳳參校并讚元始演法鍊真保度章衆生執相難造玄微故重演混元顯陳模範也參校曰此青元注經表二章之第二也天地運度八十八言前者制魔護道今當再肇生成的彰靈寶作用參校曰此青元注經條分八事之五也元洞玉曆龍漢延康眇眇億劫混沌之中上無復色下無復淵元洞者元始大洞之祖氣也玉曆者大洞啓運紀述天真功績升降及劫運度數之事也始於龍漢終於延康天地生成幾成幾壞莫可記憶故云眇眇每一劫壞則天地蕩散山海消融物象一空無復形質但元洞之氣混然不分沌然始構者也故云混沌當此之時暗包真一之水而五行未胚故上無色象可見下無淵極能窺風澤洞虛金剛乘天天上天下無幽無冥無形無影無極無窮溟音茗涬胡頌切大梵寥廓無光風木也澤水也上風下水空洞虛無隨氣扇潤而金剛之氣乘載天根天地之形於斯始見幽冥者隱顯之謂也形影者物象之謂也窮極者分際之謂也溟涬者曠蕩之謂也當其混沌之中天上天下塊然無形孰有隱顯物象分際之别惟大梵之氣溟溟涬涬自成其功寥兮廓兮未有光影及後金風之氣相摩乃生其火四象化合土自生成博載天地長養萬物為造化之主也五行既判二儀始分於是陽氣上而成天陰氣下而為地即五行相生天地之道也且三境高真過度災劫如閲世之春秋易於反掌而衆生沉滯生死輪轉無窮亦如是也赤明開圖運度自然至赤明元年大運啓圖玉曆定紀天地再開於是天地日月星辰山川物象一時分判晝夜寒暑四序推遷各得其所岡有差忒故云運度自然凡世間一甲子為一小變一百年為中期五百年為一大變十變為一小劫三小劫為一大劫此億劫之例也混洞之氣降兆生成五行返覆為天地之終始如人在胞胎漸分形識五臟布化以丹田為基長養黍珠惟此為妙假赤明之氣煆鍊成寶運度無差自然合道永作真人不拘此劫運也頌曰乾坤劫運與人同變滅無常始復終惟有一靈真寶物光明烜赫鎮無窮元始安鎮敷落五篇赤書玉字八威龍文保制劫運使天長存天地既立猶拘劫運元始乃觀梵氣之結形刻玉為雲篆以鎮梵天已經火鍊故曰赤書著成靈寶之文具載妙元神真道故曰五篇一以保制劫災一以提拔下士俾夫學者悟其妙者入其妙悟其元者入其元悟其神者入其神悟其真者入其真悟其道者入其道然後盡妙合元盡元合神盡神合真盡真合道自然無毁無滅超出度數與天長存頌曰五篇文字隱玄功保制災危鎮梵宫箇是赤書真妙訣且將符篆作形容參校曰九品仙籙經曰昔混元溟涬諸天未分元始肇形五劫初化乃命梵元祖晨道君肇録天元運乘五劫故元洞者以成祖氣玉曆者以紀天元自一氣化分三因成九若龍若蜒蟠曲九道漠漠無極總九陽祖氣之元太上以運梵合氣開始青天元祖氣故東方得九氣以分天境劫號龍漢又合氣開南丹天元祖氣故南方得三氣以分天境劫號赤明又合氣開中黃天元祖氣故中央得十二氣以分天境劫號上皇又合氣開素靈天元祖氣故西方得七氣以分天境劫號延康又合氣開北玄天元祖氣故北方得五氣以分天境劫號開皇五劫既周昊天成象一氣混道八景流光八帝示形九霄分化故元始天尊命天真皇人以玉曆紀元洞之初劫運流復之本諸天分境結元洞五陽之氣為玉曆以紀天真天民劫運功績升退之道明九聖九品之階今附見于此至如億劫年數考究未的蓋劫運大小不一年數亦不一有天地成壞劫其最大者也有大劫中劫小劫之分其年數多寡上天所祕經文所不載者非世人所能盡知故也混合成真一百六十八言前明生成建立之規今則的指真靈孕寶運化之妙參校曰此青元注經條分八事之六也梵氣彌羅萬範開張元綱流演三十二天輪轉無色周回十方旋斗歷箕回度五常三十五分總氣上元八景冥合氣入玄玄梵氣者元洞一氣之所化先天地立為大道根倏升倏騰自浩劫來彌覆三界羅絡諸天元始資之而御運天地賴之而生成兩儀既分物象咸布故為萬範開張也梵氣為元化之綱流演於三十二天如輪運轉自然無色界起周回十方綿綿不息從斗至箕左歷二十八宿躔度如是一周天應人間一歲之運天罡左旋五星右轉會合成功也二十八宿合日月五星故云三十五分也總受高上天元之氣八景冥然交合是謂玄功玄而又玄故云玄玄如生神寶章曰混化歸玄一高結元始王之義如人之身筋脈纏布百脈通流元氣徘徊一身受潤三田華素五臟清夷始得成真頌曰梵氣從教左右旋須臾歷盡一周天可憐不費纎毫力直到華胥謁上仙玄中太皇上帝高真泛景太霞嘯詠洞章金真朗郁流響雲營玉音攝氣靈風聚煙紫虛鬱秀輔翼萬仙千和萬合自然成真玄者紫微天心玄都中宫也太皇即明皇道君上帝高真即靈寶至真也言玄都中有此上真當泛景太霞之上嘯詠大洞之章開度學人於是金真結而朗郁流聲響於雲營玉音收攝於散氣靈風混合而生煙遍紫虛而鬱秀乃輔翼乎萬仙故千和而萬合成靈寶而登真修真之士使梵氣回旋帝真在定金光朗徹流雲徘徊自然虎嘯風生龍吟氣聚大寶無不媾成也頌曰祖氣朝元玄又玄太皇面目儼然全風煙聚散神光定精鍊成容合自然真中有神長生大君無英公子白元尊神太一司命桃康合延執符把籙保命生根上遊上清出入華房八冥之內細微之中下鎮人身泥丸絳宫中理五氣混合百神長生大君乃斗中之尊星也太一桃康為領衛無英白元為輔宸皆斗中真人也執玉符定金籙保人形命主生化之根上則遊行上清高虛之表出入丹華之房周極八冥目至細微造化之內下則鎮人身宅或居泥九或住絳宫中則調理五運之氣會合百神也若降氣在人則為內景之精光長生主心白元治肺無英居肝太一司命住腎合延桃康主脾符籙以喻氣血斡旋以保生根一則居臍所以調理五氣一則升腦所以混合百神交合依時是名顛倒升降得所是名返復故五行顛倒則大寶氣足三田返復則陽神上升永為真人所以十轉回旋靈光遍體萬氣俱得而仙始超無漏如救苦經云天氣歸一身皆成自然人頌曰妙哉靈寶七般神上通天關下微塵運用只憑些子訣便超無漏作真人十轉回靈萬氣齊仙十者陰陽之成數也如乾九坎一成十坤六離四巽二兊八艮三震七皆合成十乃天地之大數變化之根元所以十轉回靈則盡周天之極數自然靈光充溢萬氣還元各得其真也頌曰周回十過運三靈萬氣歸根混一真這箇機關能解悟霎時天地變黃金參校曰經注條分混合成真一百六十八言此皆靈寶度人鍊形了命之妙而青元注內又發明之道德經曰谷神不死是謂玄牝此內丹歸根復命之根蒂也蓋採藥而歸復入室而成胎舞蛻而脫胎升頂鍊形而釋結解胞瘟養而氣足形充功滿而調神出殼老君聖紀有訓羽化神仙無令斷絶丹成而蛻蛻而騰虛御景身外有身是謂之仙近代紫陽張真人一派有金丹四百字悟真篇翠虛吟紫清文集等丹經口訣亦多顯露如潭底日紅陰怪滅山頭月白藥苗新歸根自有歸根竅復命還尋復命關卯酉甲庚須沐浴朔弦晦望每防危百刻寒溫忙裏準六爻文武靜中看採藥沐浴火候抽添之真機未嘗不泄於文字間但禁戒至重古今所同魔試相干堅定方可故必真踐實履積行纍功方能因緣遇合成就又如參同釋祖達磨形神俱妙隻履西歸之事實録中有胎息經略曰玄牝之門駐景之户若能兼行自然甘露蓋未嘗非道德經中旨也又有調神歌一篇與丹經調神之法合同其歌曰調神如嬰萬法無情恬如恬如神兮自寧調神如嬰寒暑枯榮治之覆之形神自貞調神如嬰啓合形神形神啓合如琉璃瓶中有金像虛實交并像喻法體瓶喻色身外不可染內不可塵像之與瓶皎潔分明不一不二如水澄停無濁無清水亦無形出不由户非功非程鏡兮若明萬像自形水兮若清月影自形非學所得非師所成如蟲食木偶然自成萬像之形如月之明萬法之名如谷之聲法本無法名本無名無名無法不起神形形神不起感之則生妄風不起神何不寧善聆若聾善視若盲智不如愚老不如嬰調之千日自然能醒惺中之夢夢中之惺明者不言言者不明有言則漏有漏不生日待朝升我性常明月待圓成我體長形天食滋形含靈抱英醍醐之瑩牛頭之馨行一空味神怡體輕血化為乳骨化為瓊能獅子吼變野牛聲白毫生額金仙道成祖師之妙寂寂冥冥神不見形形不見神即心無心即形無形心尚不見此外無名形神無主舍識皆平誰健誰衰誰滅誰生誰喜誰怒誰怖誰驚誰念誰思誰辱誰榮如日升天自行自明勤而行之祖師之程今附于此勸勉學士四百一十三言前明鍊真軌範今則開示勤惰黜陟之白重伸勸勉參校曰此青元注經條分八事之七也仙道貴生無量度人上開八門飛天法輪罪福禁戒宿命因緣普受開度死魂生身身得受生上聞諸天諸天之上各有生門中有空洞謡歌之章魔王靈篇辭參高真仙道好生甚於人之求生仙道度人常欲衆生不死而死滅之理人世自迷故太上慈悲區區至切所以上開八門下應八元自八門中進修皆可升真入妙法輪者無上妙法之所運轉不息亦開示輪回之道設以罪福之禁戒宿命之因緣皆警悟凡夫使超出苦輪而轉無盡法藏也於是死魂生身皆獲品度上告諸天隨念升入諸天各有長生之門升墜之格中隱空洞正音謡歌之章乃魔王之所述勸勉學人其辭皆與高真參合也頌曰仙道區區度學人八門開設向迷津勸君只向生門入升入諸天轉法輪第一欲界飛空之音此界天人以欲樂而墜故魔王述飛行虛空之道使離諸欲樂進入輕清故云飛空人道眇眇仙道莽莽鬼道樂兮當人生門仙道貴生鬼道貴終仙道常自吉鬼道常自凶高上清靈爽悲歌朗太空唯願仙道成不欲人道窮北都泉曲府中有萬鬼群但欲遏人算斷絶人命門阿人歌洞章以攝北羅酆束送妖魔精斬馘六鬼鋒諸天氣蕩蕩我道自興隆人道甚微易失故也仙道莽大易證故也六欲染著易為迷惑故云樂也欲之為害當人生根仙道好度使超欲樂進入高空而天人欲根未嘗暫離仙鬼之道如君子小人各願為其類相為喜也是以仙道尚升鬼道尚墜如善人為善惟日不足惡人為惡亦惟日不足為仙道者常自吉慶為鬼道者常自凶邪所謂吉者去欲而已所謂凶者愛欲而已唯高上至聖言辭清靈爽秀悲憫天人易入鬼趣故作空歌敘六欲之苦不欲其墜也北都泉曲者拘囚之所凡天人報盡乃入其境故云中有萬鬼羣但欲遏人年算絶人命根欲染之樂其報如是天人能保人道深鑑鬼趣故稱阿人常歌洞章攝伏魔類斷絶六欲之根故云鋒也頌曰六欲原從暗裏來相牽鬼道可哀哉君還會得悲歌意束盡羣妖道眼開第二色界魔王之章此天自以色塵為樂故述以玉清之道離色忘塵升玄入妙落落高張明氣四騫梵行音衡諸天周回十方無量大神皆由我身我有洞章萬遍成仙仙道貴度鬼道相連天地眇莽穢氣氛氛三界樂兮過之長存身度我界體入自然此時樂兮薄由我恩龍漢蕩蕩何能别真我界難度故作洞文變化飛空以試爾身成敗懈退度者幾人笑爾不度故為歌音此天落落然高張遠大明騫之氣四朗乃梵氣所化周布十方也無量大神即天中魔試之所變故云皆由我身蓋仙道好度出此洞章使人了忘色塵超出空有升入三清而天人自以為樂不知所向故云仙道貴度而鬼道常與相連所謂進則成仙退則成鬼進退之間人當自擇天地之間眇莽高大穢氣氛積色界雖樂尚有劫災墜之下苦失之不難須得了忘塵染升入三境乃可長存能度此界則真相之體進入自然當爾之時不生不滅萬為樂也我恩謂色塵良由超出色塵也龍漢謂玉清上聖之道蕩蕩無際皆可證之今爾等但以色界為樂故真偽莫分故化洞章以相勉也千變萬化魔試天人其間懈怠者多升進者少笑爾不求自度故作是言也頌曰人言此界極難度我道色塵容易消但使自家心似鐵從教爐鑄火來燒第三無色界魔王歌曰此界天人以遣心故返為所纍故魔王述以匡御之道令識變詐使決證神仙三界之上眇眇天羅上無色根雲層峩峩唯有元始浩劫之家部制我界統承玄都有過我界身入玉虛我位上王匡御衆魔空中萬變穢氣紛葩保真者少迷惑者多仙道難固鬼道易邪人道者心諒不由他仙道貴實人道貴華爾不樂仙道三界那得過其欲轉五道我當復奈何此界天人去色忘塵而未達究竟之道以遣魔故返為魔纍故天王陳匡御之法欲開悟之言此三界之上惟有眇眇大羅無色之宗但雲層峨峨而已下仙不可窺盻得元始之道居其中無有終始故云浩劫之家也統係玉京部制過此分界則轉玉虛之境魔王自言我居此天最上王位常匡御衆魔方保長存飛空之中千變萬化升度學人而塵穢之氣常自紛葩也言天人雖則離染忘色未能遣忘尤以心識為患至於觀空入妙尤復為難故鬼道易為邪入欲作真人忘心自遣而已諒不由於他事乃為仙道者以實為人道者以華今爾等天人若不進登真仙之道則三界何以超凌頌曰聲聲勸我御羣魔惟是羣魔直恁多要做神仙元自已若居鬼道不由他紀述功果一百一十七言前者以顯戒言則今明示所得決定功果以堅固學人參校曰此青元注經條分八事之終也此三界之上飛空之中魔王歌音音參洞章誦之百遍名度南宫誦之千遍魔王保迎萬遍道備飛升太空過度三界位登仙公有聞靈音魔王敬形敕制地祇侍衛送迎拔出地户五苦八難七祖升遷永離鬼官魂度朱陵受鍊更生是謂無量普度無窮如上歌音者乃三界之上飛空之中魔王之所製也其音參大洞之章若人誦之百遍亦如天人離塵絶欲故得名度南宫誦之千遍亦如天人觀空入妙是為道備飛升太空仙公者太極第一品之仙真此則誦經功德所獲如是其有聞見者次獲如下功德魔王敬形敕制地祇侍衛送迎拔出地户五苦八難雖七祖皆得受生如是生死兼濟故云無量無窮有祕上天文諸天共所崇泄慢墮地獄禍及七祖翁此經盡天地萬有聖腎資生皆所總言故劫以四萬之遠方許傳度恐下士輕易重設禁綱而為偈頌曰三氣氤氲結大羅述成音韻作空歌天尊説法本無法豈是人間筆舌多道言此二章並是諸天上帝及至靈魔王隱祕之音皆是大梵之言非世上常辭言無韻麗曲無華宛故謂玄奧難可尋詳上天所寶祕於玄都紫微上宫依玄科四萬劫一傳若有至人齎金寶質心依舊格告盟十天然後而付焉聖賢隱奧下仙不可窺盻得真道粗識其詳有志以金寶質心方許傳付祕禁之科不可輕犯後世淺識之士妄有改易及傳非其人者宜省斯言頌曰玉臺深鎖印金泥雲錦龍文祕紫微四萬劫來方一遇學人曾敢怠修持道言夫天地運度亦有否終日月五星亦有虧盈至聖神人亦有休否末學之夫亦有疾傷凡有此災同氣皆當齊心修齋六時行香十遍轉經福德立降消諸不祥無量之文普度無窮未得真道之士否泰吉凶故常理也後學心未堅固乃設此章以天地聖賢不逃大數而況後學者乎博達之士三省斯言自無魔試同氣者自清濁分一生二二生三三生萬物品物流形均受元始一氣而生人人皆是同氣頌曰霄壤神人或異常凡夫安可沒災殃同心發箇度人願十讀斯文為解禳道言夫末學道淺或仙品未充運應滅度身經太陰臨過之時同學至人為其行香誦經十過以度尸形如法魂神徑上南宫隨其學功計日而得更生轉輪不滅便得神仙末學之士未遂成道則仙曹未有名籍遇數則終形識當壞不免同入太陰返視陽仙誠隔霄壤若同學之流為之濟度方得返形為陽頌曰學人修道冀登真逐妄翻成墜苦因若也同儕垂濟度南丹即日鍊魂神道言夫天地運終亦當修齋行香誦經星宿錯度日月失昏亦當修齋行香誦經四時失度陰陽不調亦當修齊行香誦經國主有災兵革四興亦當修齋行香誦經疫毒流行兆民死傷亦當修齋行香誦經師友命過亦當修齋行香誦經夫齋戒誦經功德甚重上消天災保鎮帝王下禳毒害以度兆民生死受賴其福難勝故曰無量普度天人自利利他為第一行太上設此一章明此經非惟度已雖天地君臣民庶皆可兼濟方為道備乃顯度人之普頌曰學人修習洞玄章慈愛之心不可忘為國為家兼濟度度人功德始無量道言凡有是經能為天地帝主兆民行是功德有災之日發心修齊燒香誦經十過皆諸天記名萬神侍衛右别至人尅得為聖君金闕之臣諸天記人功過毫分無失天中魔王亦保舉爾身得道者乃當洞明至言也宗奉禮敬輕泄漏慢有一至此則鬼神所不容私而況諸天乎太上以世人之志成毁無定故云諸天記人功過毫分無失前章已是誦經威儀今復以四種美功重伸優勸皆諸天記名者隨功紀籍萬神侍衛者靈寶衆神也友别者五帝以友别之稱為至人尅得為聖君金闕之臣者即為後聖金闕之侍臣也頌曰學人志念若浮漚勤惰難為定性求若也洞明靈寶語上清即日可遨遊諸天中大梵隱語無量音元始靈書上篇東方八天廣生高映覺元洞虛應玄九真化交肇圖文靈運構宗範玄都感變總括威昭自成緑岑遷景皇道含明天琳耀權氣精育魂融羅負立圓英隱旻期巨神包洪綱告寧南方八天章炎通泛堅敷澄宗虛象玄華龍陽儛穹微正霄艷淵太凝沖元關三紐太梵飛空隱覺隆益天倫慶呈神户纏絡真元散精淨握冥昭回合升遷導騫宴雲靈應騰天西方八天剛澤徽控陰峻孤儀貫氣明素宸洞開微周化幽應澄虛帝臺平遐揖虛恢茂童池結飈臨育麗無散開陽通百六沉芒隱階幽廓冥默峯真會靈堅丕順道告命騫林北方八天龍安洞變純陽隱玄方本還氣象伏高員神變慧化解鍊靈根赤精純道成號威尊利雲友常億劫中丘鬱城瓊壘謡音慶流受位玉室大憲通幽玄章煥落綱輪乃周上篇龍章鳳篆之文亦名除禳水火漂溺玉章參校曰青元經注引天公經云大羅宫有上篇觀覺鬱繿者龍篆正文謂此也蜀本敘在靈書下篇後但既曰上篇章篆合置上篇之列别本已有置此在上篇後者今從之觀覺鬱繿太明紫靈九神度魂開關玉真阿奕煒燁飛天流音輪景帝常都靈頤臻豁落大有慶雲啓靈七曜輝魔恬懀敷榮虛無上首天啓彌宸四吁育象濯曜騰精煥赫洞陽浮景玉光七靈謡歌世元紫堂羅英散景耀明玉房八景總獸韶王攝精九都騫鬱飛生上靈密羅淨境馥郁空輪灌沃黃華霐運玄明神宫開朗延宛丹庭大猷浮景真定化元蜒宛素眇玉梁澄煙蕭峙結嵎景羅七纏秀盤三府流輝九玄寂然虛邈飛華拂軿晨濫録籍太漠由延阿丘九度六龍儛轅蓊藹浮羅紫精馥淵溟涬太育九機化乾覆形厚德元河瀹精育英明陀景辰眇雲大隗總監秀樂禁天紫虛陀丘劫量交前碧霞韻梵眇眇遊元六變運量馘絶惡愆恢寂玄漠萬度成仙元始靈書中篇道君撰天公經云雖有諸天猶拘劫運於是玉宸道君撰元始靈書四篇凝雲作篆每字方廣一丈八角垂芒以鎮三十二天大羅宫有上篇觀覺鬱鑑龍篆正文中篇即此文也道君所述下篇即森角儲雲乃皇人美此隱音重述之也東方八天叩齒九通思九色玄龍導引從前後青雲九重覆匝身形密呪曰赤明開圖九氣回真總統元關青帝大神流化九外纏綿我身靈音八書六十四篇洞明天地與我合仙運致龍駕上升帝軒呪畢引氣九咽止亶婁阿薈無惒觀音亶婁即玉京山上長樓也阿者此天司候之神名阿那薈者天中遊冶臺名無者虛無惒者日月之户觀者觀覺天帝之諱音者歌音謂玉京亶婁其勢長大上接玄都之阿每朝會時阿那登此樓擊大鼓則諸天真聖皆集歌洞章自日月尸間朝元始于虛無也然後天帝觀覺領真人登遊冶之臺三唱洞章以開度人天此則元始以鎮黃曾天之雲文須延明首法攬菩曇須延皆天真之諱明首先聖之名法攬菩曇即玉清四府真人也當大劫交元始命須延開玉真之府納諸仙真明首主持正氣開導諸天梵氣於是元始散遊諸天則法輪引籍攬覺度魂菩提轉輪曇頤揚幡自是九地開光學人受度此則元始以鎮玉完天之雲文稼那阿奕忽訶流吟稼那此天中掌籍真人阿奕此天苑圃中瓊林寶樹之呼忽者飛天神王名訶者元始消息之稱流者流布吟者吟詠當劫初時元始於阿奕之下噓呵元梵之氣自成靈音流布萬天皆得吟詠然後稼那舉籍定是非死生上奏玉京即飛天神王下度世人也此則元始以鎮何童天之雲文華都曲麗鮮菩育臻華即東極青華之都曲者歌曲麗者玉女之名鮮者慶雲之象菩者此天中寶樓名也育者帝諱臻者至也謂元始時於華都命仙聖領諸玉妃登菩樓歌洞章則鮮雲集其上於是玉帝乃臻開度九夜此則元始平育天之雲文答落大梵散煙慶雲答落謂此天中宫闕巍巍上有答落之庭大梵元始宥令之稱散煙慶雲乃北天梵氣之餘者也謂元始開大赦於答落宫庭收攝元氣放釋罪魂咸得餘氣復元結成雲煙而聚集此則元始以鎮元明文舉天之雲文頌曰阿那登樓嗚法鼓洞章三奏日月户元始遊行轉法輪登命須延開玉府嗟呵之氣成玉音流布萬天得歌舞天君王妃登菩樓煙雲搖曳舒玄素答落宫庭大宥開無量衆生皆受度飛灑玉都明魔上門飛者飛天神王灑者迅速之狀玉者玉真都者酆都明者明曉魔者魔王上者上帝門者門下也謂元始為諸飛天神王演説正道自龍漢之劫至于延康一一灑然學人能明曉其音則玉真開長夜之府酆都度八難之魂魔王保迎上帝育神門下天真欣然保度此則元始以鎮摩夷天之雲文也無行上首回跖流玄行音莖跖音隻無者虛無行者運行上首北帝下宫之名回者回轉跖者履跖流者流晨之華玄者空也謂元始稟虛無上道綱維八極使梵氣流行下環北帝宫以彌羅諸天運推數極則大劫交至初則元始復以流晨光華履導空虛而布化玄者玄空此天有空峯山乃生死所歸學人道未備足身應滅度其魂升入此山俟功滿德足然後轉入南丹鍊度此則元始以鎮越衡天之雲文阿陀龍羅四象吁員阿者此天中之山名九折連阿而上陀者山上樓名龍者亦山名與阿陀相去九萬里羅者日月之呼四者四極象者象車吁者南昌上帝隱諱員者日中仙童之名謂阿山陀樓其氣與玉清相屬此天帝君常遊其上察人罪福日月之光照于上學人道備則四極真人乘象車而下度其身引領而謁南丹吁帝以求鍊度日中仙童仍以九陽金精之華灌濯其體此則元始以鎮蒙翳天之雲文也南方八天叩齒三通思朱雀鳳凰翻翻直前後絳雲三重覆匝身形密呪曰三氣徘徊靈鳳來飛玉音八字爛煥紫微吉日大慶我道洞開朱丹哺飴仰吸靈暉身生水火絳帔羽衣登空飛步足踐丹梯周旋八天七祖相隨呪畢引氣三咽止南爓爓音艷洞浮玉眸詵詵南者南方丹天世界爓者火焰洞者洞陽宫也浮者浮沉玉眸者火之膏質詵詵者盛也謂南方丹天有洞陽宫流火之庭火焰飛浮洞煥八方玉眸之質光明交映詵詵然何其多也乃真人鍊形之所此則元始以鎮和陽天之雲文也梵形落空九靈推前梵形謂元始從劫至劫歷代化生皆以大梵之氣凝而成形以一神而現不受胎生從空而生故云落空九靈者玉都九華真人推前者此天中臺名真人常奉天帝散花其上嘯詠洞章開度天人也此則元始以鎮恭華天之雲文澤音托洛音鶴菩臺緑羅大千澤者天中山名洛者神真道君諱菩者飛天真人內音臺者玉臺在澤山之陽緑羅者月宫夫人內音大千者世界劫數之稱凡百至千曰一千自一千至再千曰小千自小千至再千曰大千謂澤山衆龍所伏中有黃房之宫洛君居其中自劫至劫不滅不生時領諸菩登玉臺歌洞章以度人緑羅字羅英其形如玉美瑩無艷乘大梵氣理治太陰度數以應天元無有差忒至大劫交則日月俱會於玉臺俟劫運再開復運化也此則元始以鎮宗飄天之雲文頌曰浩劫由來元始王龍漢説法至延康開明無上真道氣連環運轉維八荒學人道備功德滿拜謁吁帝登南昌玉眸黃華光四映火鍊魂神應九陽始乎元始下生界梵氣結形空裏翔澤山真人得至道不生不滅居黃房經緯天地日與月亘大千兮莫可量眇莽九醜韶謡緣邅眇莽者混沌之狀九醜者大力鬼獸韶者魔王內音謡者瑶歌緣者南斗之别名邅者北斗之别號謂天地未分其狀眇眇莽莽九獸之鬼齊天而生應天度九九八十一萬數數極而劫交此鬼號為九都使者元始使輔三官同考生死韶者神霄宫魔王謡歌惱試學人若心堅固保舉之司詣南北二司係仙籍除死名次入此天之金華山謁太乙帝君求合同符契乃得遊宴諸天此則元始以鎮皇笳天之雲文雲上九都飛生自騫雲上者飛天神王內諱九都者九玄之都玄臺之别名也飛生者更生大神之名自者從也騫者騫林也謂雲上散百和名香流五雲之華執太真玉印十絶靈幡一日三回回幡一周則諸天上帝齊到壇下繞壇三匝誦詠洞章然後開度若人識此歌音則更生大神為開不死之路流長生之氣鍊其五魂五魂既鍊則八景存焉從而保舉入玄臺遊騫林矣三十四年畢元始命下乃得南丹鍊度此則元始以鎮堂耀天之雲文那育郁馥摩羅法輪那者此天天王侍郎之內名育者天闕空輪郁馥者斗中靈童內號摩羅者天中魔王法輪者大法之輪也謂那主四時之氣運大法輪正天分度罔有差忒數極則劫交然後魔王歌洞章之曲而度應受度人天輪十轉足則諸天上帝三界萬神俱至郁馥唱禮一唱萬神齊禮魔王束形此則元始以鎮端靖天之雲文霐持無鏡攬姿運容霐者龍淵之神都監之內號持者龍淵之名也無鏡者飛天神王名也攬姿者三界天門之名運容者玄和玉女異號謂九龍伏于持淵常含金罌而運東井黃華之水以灌濯於天人學人成道無鏡為開長夜之府升度其九祖同過三界天門然後運容玉女以朱陵之氣引導其魂玄和之津灌注其體此則元始以鎮恭慶天之雲文馥朗廓奕神纓自宫馥朗者天中玄臺山名廓奕者天中神公之內號神纓者紫微靈童名也宫者紫微宫謂廓奕神公與元始同生為玄氣之祖常與此天帝歌洞章於馥朗之上然後真人為開度學人神纓導引自紫微宫而朝元始此則元始以鎮極瑶天之雲文頌曰學人欲謁金華真謡歌不試胡為成况復飛生流道氣鍊濯五魂澄百神那兮運輪魔敢犯朗馥一唱束萬形無鏡時開長夜府九祖俱沐玄和津廓奕猶歌洞章曲直造紫微朝玉宸西方八天叩齒七通思白虎獅子導引左右素雲七重覆匝匝身形密呪曰七氣金靈八天尊神白虎策輦獅子捧轅七氣纏綿鍊我成仙身發金光映照素靈內外變化升入洞門七祖出夜九幽放魂億劫開度隨運長存呪畢引氣七咽止刀利禪猷婆泥咎咎音高通刀利者南方世界之號襌者國名襌黎也猷者好生君內名婆泥者洞陽宫靈童名也咎通者天中魔王內諱謂刀利世界襌黎國土有洞陽之宫元始於此火鍊真文真文既經火鍊光明瑩徹洞煥萬天然後此世界為大福堂一切罪魂咸令升入若人成道猷君監真婆泥鍊魂而度命咎通常遏絶生門若明此音則衆魔奉焉此則元始以鎮孔升天之雲文宛藪滌色太眇之堂宛藪天帝內號滌者滌蕩也色者色界也太眇之堂者乃天中大福堂也謂皇崖天帝主開太漠之經理治天氣每領諸真遊行色界諸天出入上清之府蕩滌穢氣保持此界之天開度善信之人若諸天人行業高者則天帝升之得乘景雲之車上生太眇之堂乃天之祕府中隱大洞自然之章此則元始以鎮皇崖天之雲文流羅梵萌景蔚蕭嵎流者天王名也羅者月女之諱梵者飛天真人名也萌者元始天王之名景者景皇乃四極上真蔚者蔚秀乃景霄仙人簫嵎者劫仞之宫謂流君時遊九霄月皇遊宴之儀飛天真人開九天之關萌君正梵氣開度天人保固極風之根又簫嵎者乃西方白素元君之宫景皇蔚秀開治其中學人明識其音乃可以馭丹龍之轡升九色之霄陟九皇之臺此則元始以鎮極風天之雲文易邈無寂宛首少都易邈者始皇天帝內名無者虛無寂者庭名也宛首者太上道君內諱少都者日中仙童名也謂始皇天君自龍漢而來至于赤明居虛無之內處寂寂之庭奉道君開元始之奧演大法以度人靈童少都仍散日華之精以灌真流飛霞之輝以拂塵此則元始以鎮孝芒天之雲文阿繿繿即濫郁竺華漠延由阿濫者天帝隱諱郁者魔王郁默之稱竺者謂欲界也華者謂色界也漠者溟漠也延乃束鬼之庭由乃禁鬼之房謂郁魔之衆惱亂天人或居色界或居欲界隱現於光華之內眇漠而不可尋究帝君阿鑑登九層之樓歌洞章以攝之於是衆魔應響而束身羣鬼詣由而伏形保愛天人也此則元始以鎮浮容天之雲文九開自辨阿那品首九開天地大衍之數自者自然辨者明辨阿者天帝內名阿丘也那者那邪飛天神人隱名品者品量首者衆首謂大衍之數天地未判三氣混沌開為九分九度九度既開然後陰陽男女别自然明辨也又帝君阿丘常登龍山遊九玄之都赦諸那邪遊空開度善根之人品度其魂升入飛仙之上首此則元始以鎮江由天之雲文頌曰真又火鍊光瑩徹無量罪魂升福國皇崖帝君遊諸天升出天人齊行業流羅梵萌持九霄極風之根無散滅赤明教主曰道君開玄演法以度人郁魔隱現不可尋一聞洞章皆伏形戒爾衆生修善行升入飛仙第一倫無量扶蓋浮羅合神無量者此天大聖尊神扶者更生君內名蓋者此天有蓋宫浮者幽魂之呼羅者大羅合者合慶神者神公謂無量尊神總統飛天神人皆受品量而升進之更生君主長夜之録定善惡之根開大千世界度諸幽魂升於大羅諸宫與神公而合慶此則元始以鎮阮樂天之雲文玉誕長桑柏空度仙玉誕者天中玉都之别名長桑者扶桑之林柏空者洞章之音度仙者度人成仙謂玉誕有騫木扶桑之林蔭覆諸天其葉上皆紫字玉書大洞之文每神風吹返魂之草桑林鼓百籟之音自成空歌之曲故曰柏空靈雞棲於其上一嗚則天下羣雞皆應聲而嗚於是青霞扶搖太陽乃升故諸飛天神人以雞嗚之初登玉臺採五方雲牙吸咽三晨之光同度學仙之人此則元始以鎮曇誓天之雲文北方八天叩齒五通思飛龍羽蓋蓊鬱左右黑雲五重覆匝身形神童玉女羽衣飛裳侍衛身形密呪曰玄天徘徊流景上清大有啓運八字開明飛玄澄空洞陰自生五氣纏綿灌我身形冠帶北單受鍊洞靈腎府仙化內外光精飛行三界遊宴紫庭七祖同慶歡樂劫齡七寶林中反胎更生長夜出離南宫記名黃籙白簡世世生仙呪畢引氣五咽止玃無自育九日導乾玃無者飛天神王內名自者從也育者即天帝內名九者九玄之都日者日童也導即引導也乾者天常也謂玃無從龍漢溟涬之間乘運而出時與育帝乘鳳車遊九玄之都轉九機之度以應劫運之數日華童子仍開導和氣俟劫交則日停光而運化此則元始以鎮霄度天之雲文坤母東覆形攝上玄坤母者太陰都候九靈仙母東者東海覆者理水大神形者地機之形攝者召也上者上言玄者玄都謂九靈坤母治東極扶桑暘谷之淵總持地機旋轉元氣以天關地機轉動一周則水涌溢三千三百度度極則天地氣交九海混一衆水彌天覆神治崑崙之頂主填涸巨海遏斷東井之源使地機不淪如劫數終則坤母出東井召鳥母於龍門制會河源上詣帝前申告劫會仍以大鳳之車升載學人升于崑崙以朝玄都此則元始以鎮元洞天之雲文陀羅育邈眇氣合雲陀者飛天神王之名羅者月光之稱育者妙成天主之諱邈者羽林監神名眇者眇眇高遠也氣者雲氣合者合景謂陀與育俱生於雲阿之嶺抱月之光總持羽林軍時敕邈神遊行三界保度得道之人令詣羽林受符信羽林在北自與諸天合景眇眇然行於雲宫結雲氣以為衣此則元始以鎮妙成天之雲文頌曰阮樂天君無量尊開度長夜出幽昏神風飄飄吹返魂柏之空歌皆洞言靈雞初嗚扶桑端真人採集雲芽餐玃旡乘運應乾元旋轉九運保天根劫終鳥母會龍門學人乘鳳升崑崙羽林受符拜新恩雲衣縹眇朝帝軒飛天大醜總監上天飛天者飛天神王大者都録之司醜者宗伯總監者總是飛天都統之官監是領長夜之官上天者升上天中也謂飛天神王總治天地之運為三界之宗三界魔王皆受事於其府總主領八會之氣監主録長夜之魂乘其命而升度幽魂於諸天此則元始以鎮禁上天之雲文沙陀劫量龍漢瑛鮮沙者此天有沙蘭宫陀者陀丘山劫量者隨劫詮量龍漢者始劫之名瑛者飛天神王之諱鮮者日童名也謂沙蘭宫陀丘山乃紫微之別館係玉清新得受度而功未圓者常有巨萬人停散其中皆龍漢時人俟劫交則詮其功而詣上宫人能明此音則瑛君度人沙蘭鮮童引而鍊形此則元始以鎮常融天之雲文碧落浮黎空歌保珍碧落者碧霞落落浮黎者天王內諱空者天中侍宸之名歌者大洞之歌保者保持珍者珍愛謂玉隆天常有碧霞落飛天神王乘碧霞之輦一日三回引導天中諸聖上朝七寶謁帝君而稱慶於是侍宸一嘯靈風扇而成大洞之歌保此天人不拘劫運此曲尤為天人珍愛故曰保珍此則元始以鎮騰勝天之雲文惡奕無品洞妙自真惡奕者天帝內音無者太無真人品者品量洞者洞明妙者此天有福堂曰妙化自者與也真者合真謂惡奕天帝自元始祖劫修行超出三界位入玉虛故得證大聖之位至赤明開圖元始錫為梵度天王時敕太無真人開長夜之府品度罪魂使了然洞識宿命淨盡惡根升入妙化之堂與道合真矣此則元始以鎮梵度天之雲文元梵恢漠幽寂度人元梵者元始大梵風澤之氣恢漠者廣大之辭幽者幽寥寂者虛寂度人者度無量人謂元始大梵之氣恢漠無窮高而洞浮懸而不落妙不可名幽兮寂兮不可見聞其中有真真中有精冥度天人此則元始以鎮賈奕天之雲文頌曰學人能識大洞章三界魔王為録姓新受度者升陀山劫終品量騰三景飛天遊宴升碧霞導引天中諸大聖一日三朝七寶宫玉隆帝前自稱慶太無真人度罪魂普度洞然知宿命巍乎成功不可尋元梵恢漠惟溟涬幽兮寂兮離見聞中有真精精甚信度人濟物妙難名故曰隱語無量音道言此諸天中大梵隱語無量之音舊文字皆廣長一丈天真皇人昔書其文以為正音有知其音能齋而誦之者諸天皆遣飛天神王下觀其身書其功勤上奏諸天萬神朝禮地祇侍門大勳魔王保舉上仙道備剋得遊行三界升入金門言此者梵氣所結隱祕之文上能保鎮天度呼召天仙下則利益生民開度苦爽故曰無量度人也舊文者乃元始觀梵氣流注之迹合而成之字皆周回一丈薄於太虛每八字為一天氣之根凡諸天劫運成毁者亦由字之散合所致也雖高聖莫曉其字乃命皇人書為正音然得天仙則識之大勳魔王保舉上仙者都領三界之尊神保舉學人升入上仙品秩俟其道備即得遊行三界拜謁金門頌曰大梵靈章隱祕文皇人改正始流傳齋心誦處諸天悅即得升騰作上仙此音無所不辟無所不禳無所不度無所不成天真自然之音也故誦之致飛天下觀上帝遙唱萬神朝禮三界侍軒羣妖束首鬼精自亡琳琅振響十方肅清河海靜默山嶽吞煙萬靈振伏招集羣仙天無氛穢地無妖塵冥慧洞清大量玄玄也前後標敘可謂盡矣今此復以結歎靈寶所感功德一十四事書于卷末者蓋欲成就大洞之功也冥慧洞清又為靈寶四種聖功冥者冥契一切慧者慧照無窮洞者洞觀十方清者清淨致極皆靈寶之道備所獲全德也大量玄玄者道君感歎此經利濟普博妙不可名也又匠成萬物而不言我為者玄之德也玄而又玄衆妙之門故云大量玄玄也頌曰三洞諸經貴玉音文章錯落燦珠金保天鎮地禳災厄度盡塵沙無鞅人參校曰靈書中篇乃三十二天保鎮開度之梵音誦詠宣揚功用莫大而三十二天又為天人學人修證升進等級之品三界有三乘之分種民入上乘之最性命混融與道合真故道言成終總括又以冥慧洞清表之且申以大量玄玄者亦備述大乘與上乘玄覺之妙歟贊曰大象冥冥至玄之名冥合玄玄視而無形窈冥有精梵氣深凝寂兮寥兮合道混成何以言慧至神之義正慧自然神光所麗無幽不燭無之不遂自然而然如是如是何以言洞真空之謂天中空洞載在經旨纎毫無滯貫徹表裏空無所空洞然而已何以言清真一之稱道德經曰得一以清生一之始大羅玉清純清絶點歸于無形冥慧洞清四者之全空玄妙混玄之又玄空有兩忘無無亦然其太上洞玄靈寶無量度人之極功歟元始靈書下篇天真皇人撰東方八天森角儲雲九魂鍊精枳默窺玦浮枚曰蹲鹿幾揚房碧提酇回池滇黨負跂逭謁攜藻章變瑜蘭泮碧環亢傍野生極中昆清耀展洞涸寂無妙凝素倚虛羅皇達元靈南方八天炎鍍綽堂太霄瑶隅歷遐薦倚周扃加圖披嶢蹊臄觚亶渾都戟藝荼炫井欺持蒲掌維迮儀奕晃琅璀扁縷益但幽微畢雷涓湟實東赤曜叢稽玉玄演侯柏璖至規西方八天鎬正左適婆尼煞靈悲招均疆洎南躔魁靜夷損光混元覺緣道守岑遙綿徴知宣太靈湮漠昺和盧隨哲京常華墟咸堅沙栗鐸黜株會衍球裴卓雲青府業睹般基北方八天窪孩蒙甘翠宇九闌蕭鈎漣興龍汾神關溝淪泬魔豁蠻祈通玄寥亢息無知肆明蟒修吉夕馥壇時畎湯長敷昌匪庸謹濟朝康堲寬祕法侈宜廣帝理生衛肇宏人天真皇人梵氣玄遼天寶自然八合之音主治世會地壘洪澤變災厄難誦詠之者禳辟妖祥清靜道氣無不寧也地官奉書百靈畏敬神朱寫文服佩明驗施之於至學不宣於下俗也太極真人頌神雲煥層虛梵羅屯碧霄元始九龍駕皇人按青軺靈光集萬真珠影開陽寥出示靈寶篇福德由是招洞玄隱高嚴玉音泛雲璈無量匪得思道海生波濤法義同涓流滋植成嘉苗用以帳窮飢教興衛中朝帝尊壽億年太平滅兵刀稽首望玉宸靈華散金毫參校總贊曰太上真經無量度人人所以生父母之身始生之根與天地均同稟梵氣聚精生神凡軀所纍六根六塵三業所毒首曰貪嗔逐流忘返浸失善因天尊慈憫弘濟天民性命妙混經典開陳復歸其根不墮轉輪妙經初宣道性為先靜默朗清真淨本源高下平等不間山川玉相純色皆表性天空玄之中寶珠之懸真源既證真空又全寂無遺響盡歸忘言何以了命鍊氣成仙中理五氣得玄牝門百神混合十轉胎圓蛻凡而真體入自然所以致此功行兼焉行滿八百功足三千諸天記功毫分不愆魔王界中明氣四騫懈退有戒金石非堅保舉爾身飛行翩翩空有俱寂染習絶源超過三界玉虛高遷依經行持得魚之筌道子作贊莫盡玄玄天恩覆冒普度無邊元始無量度人上品妙經注卷下誦度人經應驗杜三師修誦經驗閬州天慶觀道士杜延真精心修行常持誦度人經以衣鉢修經庵石老君安龜像之座滿堂盡繪經中出相嚴潔無怠年七十八歲一日忽謂衆曰爾不樂仙道三界那得過大衆暫别各保歲寒言訖屈膝跪化既葬之後冢上常有白光居人異之其諸徒共視則冢有一穴而尸不見止存雙履而已然衆亦未曉忽有人自成都來云杜三師有書啓緘視之乃云傳言石太上勤謹視鄉龜此謂石老君也此則方悟尊師已獲尸解矣劉氏女誦經驗紹熙間果州居民劉氏有女年七歲一日有道人誦經緣化因白父母曰此所誦者何經答曰度人經女子敬欲受之父母從之不旬月悉能記憶日夜誦念不歇一日西鄰大火其家正在烈焰中人但聞誦經聲不歇將已為灰燼俄有大風回旋火勢遂過劉氏一家了無所害豈非經中神明護門之驗耶因鏤板印施以傳之王明聽經驗慶元間梓府寶珠會凡遇誦經有跛者王明策杖常至聽經一日聽經至十方無量度人處似有壯力拽其腳視之不見遂棄杖而歸人問其故明曰豫二十年聽經方知四遍説經跛痾積逮皆能起行之驗張將仕誦經驗淳熙間閬州東街張將仕晚年從黃冠受度人經每旦夜齋潔炷香調聲正氣轉誦數過凡三十年忽一日謂家人曰爾等安知吾學尸解之道尋即果捐一館時年七十七歲公丁亥生既葬再越月復值丁亥日忽於凡筵灰燼中産蓮華九莖色甚鮮白修纖踰尺因命親族聚觀共相嘉歎越三日華乃萎根植宛若因閲經藴則有欲生因蓮華之句方悟其事後有子辛於嘉泰甲子與鄉薦今為望族任照誦經驗合州石照縣吏任照於嘉泰間因目疾喪明遂棄職誦度人經以求痊忽一日雙目頓明於是愈加勤恪發大誓願將度人經寫成元始天尊聖像刊行首以化導本州天慶觀化道藏及藏經功德不日落成以是觀之豈非經中所謂説經二遍盲者目明之驗歟
