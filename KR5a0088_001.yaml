front:
  text: 元始無量度人上品妙經注卷上
  hash: sha256:b41e366e525526c40a4052e41d227e96c015176c198b88e6a294bfaba2766730
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0088_HFL_001-001a, image: hfl/0040/0040-006.png}
body:
  text: 東海青元真人注清河老人頌淨明道子郭岡鳳參校并贊太上洞玄靈寶無量度人上品妙經太上二字之妙言不能盡渾淪未判此一氣包括在恍惚之中無名無形含真一之靈即其象也太者大也為至大之稱上者尊也處崇高之位昔天地未分先肇五太太虛太元太素太質太極也五太既分然後三才立乾坤叙位道大天大地大王亦大道得一而成其大故曰太也上者聚三才之質者故成上也太上為道德之祖天地之根故標經之首洞玄者乃三洞之品洞真洞玄洞神是也又曰洞者通也達也玄者奧也妙也謂元始洞達玄一不二之道以御靈寶也靈寶者玉宸道君受元始玄一之氣化生為赤明劫位靈寶之宫明此經乃道君受元始之教也靈者含育萬物變化莫窮寶者光明瑩徹人所珍愛而此靈寶為萬化之始神明之宗羅絡諸天生成萬有莫不由之無量度人者乃元始上聖自浩劫已來廣化衆生超凡入聖算喻莫及窮古及今無邊際也愚者賢之鈍者智之故云無量度人也上品者如三洞之中三十六部統天法藏總三百九十餘萬之多莫不以此經為首劫終劫始獨步玉京故曰上品妙者微妙經者經綸又經者徑也為人天修行入道離俗升仙之徑也頌曰大道施張結洞玄濟人利物極無邊凡胎欲作飛升客為我清心讀妙篇道言視之不見名曰道聽之不聞名曰言道之為道清靜虛寂不可名模太上亦不知假得强名豈言之可言哉惟太上道君洞了元始微妙之由深造靈寶之道假象設化俾夫衆生了悟靈寶權稱曰言夫道之為言如求魚兔必假筌蹄魚兔既獲當忘筌蹄蓋道者虛玄之魚兔言乃大道之筌蹄道本無言因言顯用故云道言頌曰道本無聲豈有言聖人立法强宣傳求魚須是因筌力獲得魚時豈用筌參校曰道德經云有物混成先天地生字之曰道夫道者天地與人實同其根在人曰心在心曰性性即道道即性盡性至命者形神俱妙與道合真也儒家云言者聲也蓋道乃心之體言乃心之用道君演元始之教因人心以度人故曰道言昔於始青天中碧落空歌大浮黎土音度受元始度人無量上品昔者過去無量種劫曰昔太上道君言我往昔於元始處受此上品始青即東方大梵九霄之一也青霄梵寶之氣凝成此天東者諸方之始天尊所說靈寶度人百有餘㑹首臨此天表為衆所尊上品之義此天之氣碧而青化生碧霞豁落遍布故云碧落碧落之氣為神風所振自成空洞之歌演不空不色之妙故云空歌此天有國號大浮黎浮者虛也黎者麗也其氣浮泛嚴麗無比乃云浮黎土有淨穢而此大國碧落空歌虛無嚴麗為淨境之首非三界可擬也天尊說此經度人之功無有限量故稱元始度人無量上品也頌曰元始初開無上品一音初出衆知聞法燈自許時人續不但天尊與道君元始天尊元者玄也玄一不二玄之又玄為衆妙門始者初也元始禀玄一之道於元始之初先天先地為衆妙之宗出生之始故曰元始天者一氣之最上尊者萬法之極深當其氤氲未朕之時湛然獨立天地憑之而處尊大者故號元始天尊頌曰大塊初分一氣渾先天先地獨為尊諸生莫作元皇看此物由來浩劫存當說是經周回十過以召十方始當詣座昔天尊將說此經時以法周十過普召十方方且就坐十者盡數之極稱也以極數之法召極方之靈何自不至氣化相感其應必然周者遍通以告回者逆順而宣告召之理明矣法應普施道無妄傳皆元始召靈命真之道也若人守胎尊之君行周回十過之法則三萬六千神氣無不凑應也頌曰天尊將欲透玄機法召諸方使遍知只為主人降得定自然舉動使人隨天真大神上聖高尊妙行真人無鞅於仰切數衆乘空而來天真大神者已度三界無修無證上聖高尊從修始證從證登真妙行真人者積妙成真與道自然者也無鞅言其衆多皆元始飛行來去無礙故云乘空天尊將說此經首分三品高真以勉修真在人則為精氣神也若人胎元一定萬氣冥然與無鞅之多略無少異也飛雲丹霄緑輿瓊輪羽蓋垂蔭流精玉光五色鬱勃洞煥太空七日七夜飛雲丹霄精光五色皆上聖之靈者也合則為雲施則為氣陽之純者為雲為霞陰之純者為輪為蓋至於流精耀彩五色鬱勃洞然煥乎太空皆變合之妙在人則為五臟之華鍊之如法陰陽數足靈寶放光灌注一身洞入空景三數為陽四數為陰合而為七聖人光景回旋雖億劫不泯何止七日七夜其義蓋法陰陽諸天日月星宿音秀璇璣玉衡一時停輪自大羅已下天天皆有日月星辰為元化之機璇璣即斗玉衡即柄盈虧消長晝夜運度輪轉不停今以天尊說法在定故諸天動物暫得止息彰乎妙用也在人則心為琁璣目為日月心目俱定萬化無不停間參校曰經云日月琁衡停輪此亦兼假象設教也青元所注在人心目俱定萬化停間此誠切於初學習定之入門按老君聖紀曰常習止觀以檢其心此之義也神風靜默山嶽藏雲天無浮翳四氣朗清天尊在定萬境虛元陰陽既和風雲氣候自然清肅但以智慧觀身機緣不動則出入之息泰定何氣不清頌曰神風靜默海無雲天地澄間四氣清若使一緣才妄動琁璣又是不停輪參校曰四氣之說經注未詳圭堂居士佛法大明録論四真之妙正引證此段四氣之清其曰四真謂真常真我真樂真淨以明性命混融之妙因附見于此一國地土山川林木緬平一等無復高下土皆作碧玉無有異色衆真侍座以象考之一國地土即浮黎也若以道觀之當以普天普地皆為元始一國山川林木則高下不齊榮枯不等土則淨穢不同今說法之間皆即平等純為玉相無有差殊衆真列侍其座但觀這箇作用是何光景於人之身山川林木一一具足以定力一觀則諸塵頓息一等緬平如玉之無瑕安有高下之殊止在乎心而已心若不平遂成堆阜頌曰一國山川在已身定中觀處坦然平純為玉色元無異高下都從妄裏生參校曰經云緬平一等無復高下與夫無有異色此皆假象設教也金剛經云是法平等無有高下黃糵襌師解云心若平等不分高下即與衆生諸佛世界山河有相無相遍十方界一齊平等無彼我相此本原清淨心常自圓滿光明遍照也其義與此正同故附見于此元始天尊懸坐空浮五色獅子之上初以道法感召衆真次以定力等齊虛妄真妄既息究竟升玄此懸坐空浮之義也又懸坐者難測也空浮者無際也懸者玄也空者虛也玄虛而坐不著實相也獅子為百獸中王明此為法中主也威伏衆獸表天尊以無畏化人降伏百魔使躋道境也五色明天人之五識眼耳鼻舌身色聲香味觸為幻之本修學之士必先降伏而坐其上天尊雖登此座而身在空浮欲使人虛其心外其形道乃斯應始為超脫之本頌曰法身湛寂本真常色相求時本屬狂虛心便是空浮座正意名為百獸王說經一遍諸天大聖同時稱善是時一國男女聾病耳皆開聰說經二遍盲者目明說經三遍喑者能言說經四遍跛痾積逮皆能起行說經五遍久病痼疾一時復形說經六遍髮白返黑齒落更生說經七遍老者反壯少者皆强說經八遍婦人懷妊鳥獸含胎已生未生皆得生成說經九遍地藏發泄金玉露形說經十遍枯骨更生皆起成人是時一國是男是女莫不傾心皆受護度咸得長生天尊說經非念此經一遍止運神思舉揚大法也故一遍才周諸天大聖隨品高下皆得受生歡喜悅心讚美之音一時同出故稱曰善而十遍之義莫不體卦合變如第一遍召東方無極無量品體卦則東方應震震驚百里所以聾病耳皆開聰二遍召南方其卦應離離明麗乎萬物故盲者目明三遍召西方其卦為兊兊者說也說以習誦故喑者能言四遍召北方其卦應坎坎則止物不可中止止尚行故跛痾積逮皆能起行五遍召東北其卦為艮艮為物之終物之始終而復始故久病痼疾一時復形六遍召東南其卦為巽巽尚潔淨故髮白返黑齒落更生七遍召西南其卦應坤坤道致養故老者反壯少者皆强八遍召西北其卦應乾乾之道各正性命保合太和所以婦人懷妊鳥獸含胎已生未生皆得生成九遍地藏發泄金玉露形九陽因自發泄形完既得性命之生復感地藏開現人皆獲金玉之重寶則變臭腐為神奇說經十遍其數乃極極則反故枯朽之質復起成人蓋衆生耳病則不能聞道目病則不能見道舌病則不能宣道足病則不能行道疾痼則不能進修是以天尊四遍說經使其根器平復至十遍之周則返本還元度人之功斯乃備矣殆夫功圓道就法病頓除故咸得長生傾心於至道之域也經注說九遍解義故續添出薜幽棲注頌曰一身須籍六根成根性昏迷病乃侵只自耳邊初領解一時無病得長生道言是時元始天尊說經一遍東方無極無量品至真大神無鞅之衆浮空而至說經二遍南方無極無量品至真大神無鞅之衆浮空而至說經三遍西方無極無量品至真大神無鞅之衆浮空而至說經四遍北方無極無量品至真大神無鞅之衆浮空而至說經五遍東北無極無量品至真大神無鞅之衆浮空而至說經六遍東南無極無量品至真大神無鞅之衆浮空而至說經七遍西南無極無量品至真大神無鞅之衆浮空而至說經八遍西北無極無量品至真大神無鞅之衆浮空而至說經九遍上方無極無量品至真大神無鞅之衆浮空而至說經十遍下方無極無量品至真大神無鞅之衆浮空而至天尊說法周回十過招真命靈載度人物綜錯而言其辭重復蓋此經以度人為要故先顯靈驗次述應現之殊道君序意大義如此即非兩有十遍也如十方世界一切天一切國所有衆真無極無量品而皆禀至真之氣處至大之域神居其中所化之身無有限量浮空而至天尊之所亦元始自然之氣應化無有定名也東方東北上上襌善無量壽天太明玉完天等以至九地震宫卯位即無鞅也南方東南即梵監須延天以至赤明和陽天離宫午位西方西南即靈化梵輔天元載孔升天以至九地九水兊宫酉位北方西北即高虛清明天皓庭霄度天以至坎宫子位上下之方九風九水之多衆也筆不可紀今略言之始元始在清微天宫說法是時玉帝至於㑹前舉六神通放大光明遍照無極梵剎乃分其身示諸天宫今彼天宫各現玉京金闕光明寶座一一寶座各有化身玉帝一一玉帝各於其方演說解脫之道此諸天豈各有玉帝者哉設教示人分真垂化者也頌曰自有神靈億萬該猶如空谷應聲來十方日月虛空現只要當人道眼開十遍周竟十方無極天真大神一時同至一國男女傾心歸仰來者有如細雨密霧無鞅之衆迮國之半土皆偏陷非可禁止十遍周竟十方畢集然後天人男女感此神化傾心皈奉敬仰而來狀如細雨飛空密霧四合故迮國之半何其多也蓋緣浮黎為有限之土而天尊現無鞅之身以無鞅之多臨有限之迮理不相容故形偏陷之語又偏陷者明天人未聞至理其心局促紛亂無際莫止其止也於是元始懸一寶珠大如黍米在空玄之中去地五丈寶者人之所愛珠者清淨圓明黍米者物至微其用甚廣表此靈寶之體形微而用大清淨光明為衆所愛又黍為五穀之長人之資生不可暫乏明人之不可暫離於道也離此而獲存者如人之無食非形也哉懸於空虛去地五丈者示靈寶之妙不為五運所拘隱妙於太玄示使人天超離五濁寄妙於靈虛者也頌曰一顆寶珠如黍米人人皆有非元始不上不下向空懸誰能會得天尊旨元始登引天真大神上聖高尊妙行真人十方無極至真大神無鞅數衆俱入寶珠之中天人仰看唯見勃勃音拂從珠口中入既入珠口不知所在國人廓枯落切散地還平正無復欹其雞切陷視之不見名曰夷聽之不聞名曰希摶之不得名曰微此三者不可致詰復歸於無物蓋道之微妙本於虛無而天真之身豈有容礙但以天人與夫聖真同時混殽雲集以至土皆偏陷無可禁止殆將何以别之所以寓物化人懸珠應變使無形者還於無物也登者起而攀行引者指示化導無鞅數衆已合道真故能隨天尊升入珠內而天人有纍未可偕行然後真僞之身修證之異斯可見矣道既復隱跡豈容追廓然分散地土還平無復欹陷者也此皆元始示現神化從無起有自有入無混合百神之道非技術之比也頌曰聖人法性本虛空聚散初無異與同萬境攝歸真靜界更於何處覓餘蹤元始即於寶珠之內說經都竟衆真監度以授於我當此之時喜慶難言法事粗悉諸天復位倏欻音叔忽之間寂無遺響天尊既引諸真升玄入妙即於珠內傳道說法以授太上道君衆真齊臨監度道君受得是法喜慶之情非言可說法事者謂授受之法其事粗能詳悉不待其終諸天皆以復位何則靈寶之道不在其煩貴得其要聖聖相傳一聞千悟此義莫窮也凡一略有五倏欻一倏欻間寂寂然更無聲響之遺明夫至道復於常者也頌曰這箇靈根本自如天尊親付與他誰龍宫拾得連城寶金匱牢收勿使遺參校曰寶珠去地五丈之喻自了命修鍊者言之以明身中玄關謂五丈之義以丈為尺以尺為寸此說切矣今注以喻性珠之妙其㫖尤深蓋上文元始登引天真大神以及至真大神無鞅數衆俱入珠中而天人止於仰看未可偕行以辨真僞之身修證之異蓋非真見證道之人不能造入寶珠清淨光明境界此於了性之㫖尤切五丈以喻超離五濁不為五運所拘此說亦通若夫末後倏忽之間寂無遺響則證有已竟歸乎一無也儒書中庸無聲無臭之至釋典人空法空空空之悟清靜經所空既無無無亦無之極皆此義也因并附見于此是時天人遇值經法普得濟度全其本年無有中傷天者謂天也人者世人也此則互說天人以接下士或遇或值普獲受度得全本數之年而無中道夭傷之苦且夫人之生也皆禀妙道貴不可言不以高下皆壽百歲在人作善不善而已或以前因或以後業自夭其夀不能終於本年非天有差殊之異凡人世壽九十而上謂之上壽七十而下曰中年五十而下皆中道夭傷也南昌有格積善而獲上壽者死則先獲鍊度匪則沉尸而待焉傾土歸仰咸行善心不殺不害不嫉不妬不淫不盜不貪不欲不憎不𡜍音恣言無華綺口無惡聲齊同慈愛異骨成親國安民豐欣樂太平夫念想見聞者皆謂之殺陷於不義折傷一切物謂之害毁人成功謂之嫉恨彼榮富起曲見心謂之妬癡迷著景謂之淫取之不義謂之盜愛樂無厭謂之貪妄起念心謂之欲齒唾巧拙謂之憎疑忌仁信謂之𡜍虛浮詐誕謂之華綺出言規不淺學悮人謂之惡口今一國男女已獲護度故傾土歸仰反是而行亦云十二善業也且不殺不害不淫不盜即身業之罪除不嫉不妬不貪不欲不憎不𡜍即心業之罪除言無華綺口無惡聲即口業之罪除也前者耳聰目明則是六根清淨今乃三業頓除故成慈愛之行慈者和柔不諍也愛者物我兼容自利利他慈愛之大故雖異骨相親然後國自安民自豐相忘於道德之鄉欣樂於太平之世者也清靜常樂曰太恬淡無欲曰平國以喻身民以喻氣經始出教一國以道預有志心宗奉禮敬皆得度世此言謂道君初受此經教導一國宿有志心者皆悉宗奉禮敬也宗者宗奉此經如舟如楫如橋如梁蓋欲憑之以求濟度奉者崇奉此經如天尊親以教我我親得聞其義蓋欲誦其言而行其行也禮者禮事此經如父如母如師如長畏愛之間惟恐慢易敬者敬重此經如金如寶如珠如玉愛惜不已惟恐失之既盡四心皆得度世而長生矣頌曰數墨巡行謾役形要須行善作規針長生度世無他事只要修持一片心道言元始天尊說經中所言並是諸天上帝內名隱韻之音亦是魔王內諱百靈之隱名也非世之常辭上聖已成真人通玄究微能悉其章誦之十過諸天遙唱萬帝設禮河海靜默山嶽藏雲日月停景琁璣不行群魔束形鬼精滅爽回尸起死白骨成人三十二天帝即內名隱韻青帝護魂以至流鈴八衝即魔王內諱不死之神下以至桃康合延皆百靈隱名也夫靈寶為道氣之祖度人為百法之先元始含藴妙道出法度人流散文言制成音韻非下世文章之比中下之仙不可盻其篇目惟上聖真人深造道妙始能究玄微矣所言音韻者謂音律相諧者也且諸天萬帝日月山川皆從祖氣之分散為形質今天尊說法是以祖氣之音收攝氣散之質何自不應者也所以雲霧藏隱三景停間鬼盡魔消還元返本一一感應皆由定景而生又如律吕之召陰陽必然理也頌曰洞達玄微識道宗山川日月一家風非干苦苦誇靈寶自是真人定境融至學之士誦之十過則五帝侍衛三界稽首魔精喪眼鬼妖滅爽濟度垂死絶而得生所以爾者學士穢氣未消體未洞真召制十方威未制天政德可伏御地祇束縛魔靈但却死而已不能更生勤苦精進無有退轉謂之至學故誦經十過則五方五帝皆來侍衛三界神靈稽首敬伏一切魔鬼喪眼滅類也今夫學士修行之至形鍊氣寂一身神靈守衛其身不相遠離所謂神識自守也三界喻三尸五帝喻五臟若萬緣紛起此名內魔灾苦所逼名為外魔為苦之劇是名為精故曰魔精七情六欲是謂之鬼惱亂顛倒障我道德是為之妖以至學而誦經皆不得侵也雖大限到來能禦殺鬼妖可留此生然止可伏御地只但能却死而已不能更此形骸長生久視所謂饒經百萬劫終是屬空亡蓋真人者與道合通至學者塵情未盡誦經則品位殊矣所以如此者緣幻虛僞究竟非真小劫可逃劫盡終壞良由道之未全不具真常穢氣未消也體質暫堅未能洞入真境故無威力未可召致十方政七政也頌曰脫得無常壽且延算來不離幻中仙淺根學士休輕惑鍊質方期上九天輕誦此章身則被殃供養尊禮門户興隆世世昌熾與善因緣萬灾不干神明護門斯經尊妙獨步玉京度人無量為萬道之宗巍巍大範德難可勝若誦若遇不能嚴潔或徒為玩視或心意不專或講演不規或不擇人而授受此皆為之輕矣蓋此經為萬天所寶度人最急隱聖藏真出生入死禳灾却禍保鎮邦家莫不由此若輕而誦之身則被殃殃者連綿不絶者也可不戒乎又設供養尊禮一門以接下士而興隆昌熾與善因緣萬灾不干神明守護此皆為常人誦經之普獲功德也斯經尊妙者皆梵氣結成旋聚旋散雖大劫相交天地既壞此文獨存巍巍乎實萬天之大法推其德可勝言哉玉京者玉京山在大羅天之上有金樓玉殿真文祕篆遍在其間以此經為獨步頌曰神仙口口密相傳勿謂輕疑作等間萬物總隨桑海變斯文獨步大羅間道言凡誦是經十過諸天齊到億曾萬祖幽魂苦爽皆即受度上升朱宫格皆九年受化更生得為貴人凡者不以高下差别之稱億曾萬祖者自無始已來捨身受身所育父母乃祖乃先也凡人誦經則諸天帝君齊到其前應億曾以來幽滯魂靈久拘若爽悉獲受度上升朱宫也南方丹天世界有南昌上宫宫有朱陵之府府有流火之庭乃鍊化度仙之所也世人獲超升者經由此宫受三火大鍊煅鍊五濁穢形以玉眸之光鍊其氣質次以黃華之水灌蕩尸形然後禦孕靈真隨其報化而遂更生也鍊度之格凡有三上學三年受度中智九年下學二十四年也今以誦經之力故億世祖先皆從中等之格受化更生為貴人之品復自貴中修學即獲升度也而好學至經功滿德就皆得神仙飛升金闕遊宴玉京也上學之士修誦是經皆即受度飛升南宫愛而不捨念而不忘是名好學好學此經者修靈寶心行度人行功滿德就之日上同祖曾克證神仙之道故云皆也飛升金闕朝謁太上遊宴玉京之境也上學精修至道達妙超群者也而修者修行誦者誦經修誦兩全功高德重故不從限格徑便飛升南丹受鍊者也頌曰修持靈寶要心堅誦詠經文意欲專修誦兩全功德大即時輕舉作神仙世人受誦則延壽長年後皆得作尸解之道魂神暫滅不經地獄即得返形遊行太空宿慶與善因緣故生人趣值正教流行得遇此經者受而誦之即獲高年享世壽已不免死壞其形雖死神則不滅名為尸解如楊王孫嵇康郭璞皆捐軀返真之道故知尸解之人皆目瑩骨輕或精血不變投其尸於名山大川可生珠玉也凡誦經之士修靈寶心持度人行必致延年皆後得成尸解之道魂神暫滅更不經由地獄即得返形於太空也若學淺功微不能骨肉同飛不免尸解而返神也頌曰百年屋子豈長新物化虧時换主人道德修成千日就是非還與一堆塵此經微妙普度無窮一切天人莫不受慶無量之福生死蒙惠上消天灾下却地禍無量之福周洽死生俱蒙利益上天所寶不傳下世至士齎金寶效心盟天而傳輕泄漏慢殃及九祖長役鬼官上真朝奏往來必嘯詠此篇最為寶愛不傳下世因後聖君堅乞傳世以保甲申洪灾所以聖聖相傳不及凡俗惟有志之士齎持金寶效信質心盟告諸天方可傳授何則人之愛者惟金寶也又為堅剛之物太上設此言使人捨已所愛破慳吝心以此捨心回向大道方聽傳行又表其心堅如金石也若輕慢漏泄則殃及九祖長為鬼官所役如推潮鼓浪負石填河是也頌曰元始區區談妙義舉來法法度天民人心自是生囹圄會得牢收一卷經侍經五帝玉童玉女各二十四人營衛神文保護受經者身五方之帝各敕玉童玉女二十四人合為一百二十營衛此文保護人身也道言正月長齊誦詠是經為上世亡魂斷地逮役度上南宫七月長齊誦詠是經身得神仙諸天書名黃籙白簡削死上生十月長齊誦詠是經為國王帝主君臣父子安鎮國祚保天長存世世不絶常為人君安鎮其方民稱太平凡人作一切善福及九祖若已生人天者增益福報也若未生天者隨氣升度也若作一切不善則禍及七祖殃連子孫其人死於冥府以罪纍故連逮生人起徴呼復連傳染之禍也蓋正月為四時之首天地通泰萬物更生之時於此長齊誦經乘天官考校之格可度上世亡魂斷地司連逮之苦上登南昌之宫也七月為萬物成功之際於此長齊誦經乘中元舉善之格故身得神仙諸天書其姓名於金籙白簡削滅死籍别注生名蓋人之仙也須得南北二司先削死上生方得升度非此則終無成功也十月天地寧間之際於此長齊誦經乘下元解落之功故宜上為邦國下為民庶禱福禳灾如正一真人曰宜須為國為家興利除害然後臣事三境吾無愧焉此之謂也學士以此為心是謂無量度人之本夫念念不忘久久不替謂之長靜念守心戒慎無染謂之齊故曰長齊也頌曰日吉時良好誦經世間萬慮勿縈心濟人利物功成也玉簡金書為記名八節之日誦詠是經得為九宫真人本命之日誦詠是經魂神澄正萬氣長存不經苦惱身有光明三界侍衛五帝司迎萬神朝禮名書上天功滿德就飛升上清立春春分立夏夏至立秋秋分立冬冬至此日是太乙司命領諸官屬紀録世人罪福功過之曰有功則舉有過則罰於此誦經乘保舉之格故得為九宫真人也本命之日一身神爽同本屬星宫糾録功過上奏北斗日也於此誦經故得魂神澄正萬氣永存萬氣若存則苦惱頓息苦惱頓息則神光自明矣夫念動則魔生氣澄則魔息故三界魔王侍而衛之不為外事凡誦經存想則官吏諸神皆自頂門而出事畢復從衆妙門而入故五帝司其迎送也萬神朝集而致禮書名字於上天俟功德滿日與此一身之神同升上清之境頌曰若言誦詠作真人箇箇生疑未必聽不道氣存神正後身中無限有光明參校曰靈寶淨明度人經法度師九州都仙太史高明大使許真君教也萬神不散曰靈一氣朝元曰寶纎塵不汙曰淨無幽不燭曰明受法曰忠孝弟子有十戒文一毋忘八極忠者欽之極孝者順之極廉者清之極謹者戒之極寬者廣之極裕者樂之極容者和之極忍者智之極二毋忘鑑水鑑者喻心水者喻性心明則萬法皆照性淨則五濁不歸三毋忘日録日録者所以修檢善惡今以日録録日所為不可下筆者皆已之非也改之為貴四毋忘追度安鎮追者謂誦經行符上為父祖六親之過去者以資冥路度者謂誦經行符上為父祖六親之見存者以資福算安鎮者謂誦經行符上祝國王帝主聖壽安鎮四方五毋忘救治救治之術慈憫為先人有病者為其誦經行符至誠禳却如已父母男女凡有方便種種惠澤皆盡其心六毋忘服鍊服鍊之術參同天地效法陰陽念念正真存存不缺則自然超脫變化無方七毋忘剛潔剛則有守不行非淫潔則戒汙不貪非食不淫則不損身之精神戒食則不殺物之性命八毋忘儉約凡所衣物食用當知皆是元始祖氣化生灰水蕩穢不得修飾粟麥充飢不用珍庖九毋忘願約願者從初入道時發心約者從初入道者設誓天地神明司之毋輒中變洞神有科不可不慎十毋忘師友師者所以教友者所以勸教汝者似父勸汝者似兄孰為父兄可不欽重而委棄之乎又曰得此法者上則飛升次則度世或得尸解務在觀心無心乃見真心觀形無形乃見真形心形俱無目入無形之道則大定神光湛然見玉清境此飛升法也又按升真識神篇曰學道超真乘雲飛升天書來降仙官奉迎仙官為誰諸位真人雙龍㗸車力士捧旌前呵後衛大力天丁玉童玉女執綬執印銀璫小臣口傳帝命於此無悸於此無驚自然魂魄受鍊朱陵朱陵大將流金火鈴入天之界天有四門東華之門門官之司中有主宰日直元君中有主判録事尊神中有主閽金剛力士三位真仙問子名字考汝罪犯第汝功績不謬不錯子方可入録事二人引子上升南斗北斗各有真君録事既退真君奉迎次第奏達紫微之庭於此之時仙道已成稽首大羅元始玉清昊天玉皇三境天尊不可以見惟睹祥雲玉童傳敕倣佛可聽賜汝丹藥金珮珠纓汝如得之禮拜舞抃自有真仙教汝朝見此經真妙故說其略心宜存思慎勿乖錯念念真經上受天爵又有行淺尸解篇曰末學道淺尸解升仙於未死時必有善緣塵劫已盡東嶽落籍西嶽落牒杜令神君中有二使追引魂神汝於此時長記汝因既見冥官之庭中有刑獄可畏可驚汝無畏懼直述汝情道其緣由無隱實誠惡簿無姓善籍有名中有東極救苦真人聞汝好辭歡喜而迎同上玉輿輜軿四輪左右之神一如升真當識其姓當識其名送汝神魂受鍊朱陵次第階列逍遙上清登天之門入紫微庭或有丹藥或有真經玉童傳奏一似飛升汝之骸骨塊然遺形如蟬之蛻臭腐不馨曰子曰孫葬以盡誠宗派蒙蔭亦升仙梯仙梯在目而人不知因附見于此愚又竊論都仙許真君以此上品妙經述靈寶淨明經法而淨明二字非太空日月不足為喻朝文元公集有云儒書言清明在躬志氣如神莊子言水淨猶明而況精神聖人之心淨乎普光佛為無盡意說淨明三昧離一切煩惱性如虛空不受垢染本無一物元空之體淨之極也寂照含虛空終顯之用明之極也如太空為淨日月為明不見淨明心此理臻極故無一法可得照昏如炳燭虛已若清宫此語皆三教聖人發明二字之妙者與經中緬平一等無復高下上皆碧玉無有異色及懸珠寂無遺響一章㫖意皆同因再附見于此道言行道之日皆當香湯沐浴齊戒入室東向叩齒三十二通上聞三十二天心拜三十二過閉目靜思身坐青黃白三色雲氣之中內外蓊冥有青龍白虎朱雀玄武獅子白鶴羅列左右日月照明洞煥室內項生圓象光映十方如此分明密呪曰貪羅鬱羅符無蘇陀太冲太極陰陽包和出有入無鬼神莫測出死入生變化自然元始混氣玄中之玄上干有頂下洞太淵誦之一遍況痾自痊鍊魂育魄真陽自全齊戒禮誦萬過飛仙無上密呪萬神綿綿心中心呪重復宣傳貪羅洞明與道合真玉清上極梵氣氤氲分靈布氣降注臣身形神俱妙變化飛升一如令格統攝萬靈急急一如元始上帝玄都律令無上玄元太上道君召出臣身中三五功曹左右官使者侍香金童傳言玉女五帝直符直日香官各三十二人關啓所言今日吉慶長齊清堂修行至經臣今奏為某願得所啓徑御上徹無上三十二天元始上帝至尊几前行道有二燒香誦經步虛朝讚亦云行道精鍊身心行持道德亦云行道沐浴沐者沐髮浴者浴身亦有二法以五香水持呪洗身此外沐浴大行梵氣周回十方以至中理五氣混合百神即內沐浴齊者非止禁茹葷食穢遠離貪淫亦欲齊心以防患戒性以絶非入室者蓋欲入靖絶塵身心專注可與神靈交通者也東向為長生之方召集真氣以生為本叩齒之法左為天鍾右為天磬召仙靈也中為天鼓朝上聖也心拜者身形不動專意存禮閉目者收視內觀氣乃凝寂青為玄一之氣黃為元一之氣白為始一之氣三色之義取法三清坐而存之神明自見也如是內境亦明外境亦明蓊然冥合故曰蓊冥次存青龍自肝出居吾左白虎自肺出居吾右朱雀自心出居吾前玄武自腎出居吾後獅子白鶴各以六數存之自六腑而出居吾左右前後左目化為曰輪現紫赤之光九重右目化為月輪現黃白之光十重與身相去九尺光明煥爛射入鼻中通腦後入金華宫結成圓光大如車輪以前青黃白三色有間是為九色圓象以此光明遍徹十方世界然後微音次第存神吏俱自吾之頂出布列于前述願祝之次存思三十二天一一取氣咽之而畢頌曰閉目將身子細觀定中别是一乾坤圓光出現仙靈集問爾誰為元始尊元始無量度人上品妙經注卷上
